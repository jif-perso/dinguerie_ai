<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="dinguerie is a living complex-plane study.">
    <meta name="theme-color" content="#f3eee4">
    <meta property="og:title" content="dinguerie">
    <meta property="og:description" content="A living complex-plane study.">
    <meta property="og:type" content="website">
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23100f0c'/%3E%3Cpath d='M12 32h40M32 12v40' stroke='%23f3eee4' stroke-width='4'/%3E%3Ccircle cx='32' cy='32' r='17' fill='none' stroke='%23c8ff45' stroke-width='4'/%3E%3C/svg%3E"
    >
    <title>dinguerie</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f3eee4;
        --paper-hot: #fffaf0;
        --ink: #100f0c;
        --soft: #756d62;
        --line: rgba(16, 15, 12, 0.18);
        --line-strong: rgba(16, 15, 12, 0.38);
        --blue: #2454ff;
        --red: #ff4f35;
        --green: #baff39;
        --mint: #38d0aa;
        --gold: #d4a321;
        --violet: #7e69ff;
        --accent: var(--blue);
        --mono: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", monospace;
        --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --serif: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      button,
      input,
      a {
        font: inherit;
      }

      button,
      input {
        color: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      ::selection {
        background: var(--ink);
        color: var(--paper);
      }

      :focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 4px;
      }

      .plane {
        position: fixed;
        inset: 0;
        isolation: isolate;
        background:
          linear-gradient(90deg, rgba(16, 15, 12, 0.035) 1px, transparent 1px),
          linear-gradient(0deg, rgba(16, 15, 12, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 50% 50%, var(--paper-hot), var(--paper) 56%, #d8cfc0 100%);
        background-size: 36px 36px, 36px 36px, 100% 100%;
      }

      #phase {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }

      .grain {
        position: absolute;
        inset: 0;
        z-index: 2;
        opacity: 0.32;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(16, 15, 12, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(16, 15, 12, 0.045) 1px, transparent 1px);
        background-size: 9px 9px;
        mask-image: radial-gradient(circle at 50% 50%, black 0%, black 38%, transparent 84%);
      }

      .title {
        position: absolute;
        inset: 0;
        z-index: 3;
        display: grid;
        place-items: center;
        pointer-events: none;
      }

      h1 {
        margin: 0;
        color: rgba(16, 15, 12, 0.18);
        font-family: var(--serif);
        font-size: 9rem;
        font-weight: 500;
        line-height: 0.9;
      }

      .chrome {
        position: fixed;
        inset: 0 0 auto;
        z-index: 5;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.3rem;
        pointer-events: none;
      }

      .brand,
      .equation,
      .seed {
        pointer-events: auto;
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 850;
      }

      .brand {
        justify-self: start;
        color: var(--ink);
        text-decoration: none;
      }

      .brand::before {
        display: inline-block;
        width: 0.72rem;
        height: 0.72rem;
        margin-right: 0.62rem;
        background: var(--accent);
        box-shadow: inset 0 0 0 2px var(--ink);
        content: "";
        vertical-align: -0.08rem;
      }

      .equation {
        justify-self: center;
        min-width: 17rem;
        padding: 0.54rem 0.8rem;
        border: 1px solid var(--line);
        background: rgba(243, 238, 228, 0.82);
        backdrop-filter: blur(16px);
        text-align: center;
      }

      .seed {
        justify-self: end;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        color: var(--soft);
        text-transform: uppercase;
      }

      .seed input {
        width: 5.2rem;
        border: 0;
        border-bottom: 1px solid var(--line-strong);
        border-radius: 0;
        outline: 0;
        background: transparent;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 850;
        text-align: right;
      }

      .readings {
        position: fixed;
        inset: auto auto 1.15rem 1.3rem;
        z-index: 5;
        display: grid;
        width: min(27rem, calc(100vw - 2.6rem));
        grid-template-columns: repeat(2, 1fr);
        gap: 1px;
        border: 1px solid var(--line);
        background: var(--line);
        box-shadow: 10px 10px 0 rgba(16, 15, 12, 0.08);
      }

      .reading {
        min-height: 5.2rem;
        padding: 0.78rem;
        background: rgba(243, 238, 228, 0.86);
        backdrop-filter: blur(18px);
      }

      .reading-wide {
        grid-column: 1 / -1;
      }

      .reading span {
        display: block;
        color: var(--soft);
        font-family: var(--mono);
        font-size: 0.62rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .reading strong {
        display: block;
        margin-top: 0.78rem;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 0.92rem;
        font-weight: 850;
        line-height: 1.25;
      }

      .roots {
        position: fixed;
        inset: auto 1.3rem 1.15rem auto;
        z-index: 5;
        display: grid;
        width: min(24rem, calc(100vw - 2.6rem));
        gap: 1px;
        border: 1px solid var(--line);
        background: var(--line);
        box-shadow: 10px 10px 0 rgba(16, 15, 12, 0.08);
      }

      .root-row {
        display: grid;
        grid-template-columns: 3.5rem 1fr;
        gap: 0.7rem;
        align-items: center;
        min-height: 3rem;
        padding: 0.68rem 0.78rem;
        background: rgba(243, 238, 228, 0.86);
        backdrop-filter: blur(18px);
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 850;
      }

      .root-row span {
        color: var(--soft);
        text-transform: uppercase;
      }

      .caption {
        position: fixed;
        left: 50%;
        bottom: 1.85rem;
        z-index: 5;
        translate: -50% 0;
        width: min(35rem, calc(100vw - 2rem));
        color: rgba(16, 15, 12, 0.72);
        font-family: var(--mono);
        font-size: 0.66rem;
        font-weight: 820;
        line-height: 1.35;
        text-align: center;
        text-transform: uppercase;
        pointer-events: none;
      }

      .action {
        position: fixed;
        top: 4.8rem;
        right: 1.3rem;
        z-index: 5;
        min-height: 2.55rem;
        padding: 0.55rem 0.8rem;
        border: 1px solid var(--line-strong);
        background: rgba(243, 238, 228, 0.82);
        backdrop-filter: blur(16px);
        color: var(--ink);
        font-family: var(--mono);
        font-size: 0.66rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .action:hover {
        background: var(--paper-hot);
      }

      @media (max-width: 920px) {
        .chrome {
          grid-template-columns: 1fr auto;
        }

        .equation {
          display: none;
        }

        h1 {
          font-size: 6rem;
        }

        .caption {
          display: none;
        }

        .roots {
          top: 4.8rem;
          right: 1rem;
          bottom: auto;
        }
      }

      @media (max-width: 620px) {
        .chrome {
          padding: 0.85rem;
        }

        .seed span {
          display: none;
        }

        h1 {
          font-size: 3.7rem;
        }

        .action {
          top: auto;
          right: 0.85rem;
          bottom: 0.85rem;
        }

        .readings {
          inset: auto auto 0.85rem 0.85rem;
          width: calc(100vw - 6.7rem);
          grid-template-columns: 1fr;
        }

        .reading {
          min-height: 3.5rem;
          padding: 0.58rem;
        }

        .reading strong {
          margin-top: 0.4rem;
          font-size: 0.78rem;
        }

        .roots {
          top: 4rem;
          right: 0.85rem;
          width: calc(100vw - 1.7rem);
        }

        .root-row {
          min-height: 2.35rem;
          grid-template-columns: 2.8rem 1fr;
          padding: 0.45rem 0.58rem;
          font-size: 0.64rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="plane" id="top" aria-label="dinguerie complex plane">
      <canvas id="phase" aria-hidden="true"></canvas>
      <div class="grain" aria-hidden="true"></div>

      <header class="chrome">
        <a class="brand" href="#top">dinguerie</a>
        <div class="equation">z^3 + c z - 1 = 0</div>
        <label class="seed">
          <span>seed</span>
          <input id="seed" value="02491" aria-label="Seed">
        </label>
      </header>

      <div class="title" aria-hidden="true">
        <h1>dinguerie</h1>
      </div>

      <button class="action" type="button" id="clear">clear pins</button>

      <section class="readings" aria-label="Complex readings">
        <div class="reading">
          <span>constant c</span>
          <strong id="constant">0.000 + 0.000i</strong>
        </div>
        <div class="reading">
          <span>discriminant</span>
          <strong id="discriminant">0.000 + 0.000i</strong>
        </div>
        <div class="reading reading-wide">
          <span>plane</span>
          <strong id="plane-note">phase portrait with modulus contours</strong>
        </div>
      </section>

      <section class="roots" aria-label="Roots">
        <div class="root-row"><span>r1</span><strong id="root-0">0.000 + 0.000i</strong></div>
        <div class="root-row"><span>r2</span><strong id="root-1">0.000 + 0.000i</strong></div>
        <div class="root-row"><span>r3</span><strong id="root-2">0.000 + 0.000i</strong></div>
      </section>

      <p class="caption">move through the c-plane. click to pin the current cubic.</p>
    </main>

    <script>
      (() => {
        const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
        const root = document.documentElement;
        const canvas = document.querySelector("#phase");
        const ctx = canvas.getContext("2d", { alpha: false });
        const seedInput = document.querySelector("#seed");
        const clearButton = document.querySelector("#clear");
        const constant = document.querySelector("#constant");
        const discriminant = document.querySelector("#discriminant");
        const planeNote = document.querySelector("#plane-note");
        const rootLabels = [
          document.querySelector("#root-0"),
          document.querySelector("#root-1"),
          document.querySelector("#root-2")
        ];

        const tau = Math.PI * 2;
        const colors = ["#2454ff", "#ff4f35", "#baff39", "#38d0aa", "#7e69ff", "#d4a321"];
        let width = 1;
        let height = 1;
        let ratio = 1;
        let bufferScale = 3;
        let buffer = document.createElement("canvas");
        let bctx = buffer.getContext("2d");
        let image = null;
        let domainWidth = 5;
        let domainHeight = 3;
        let seed = 2491;
        let rand = mulberry(seed);
        let pointer = { x: 0.5, y: 0.5, active: false };
        let cTarget = { re: -0.38, im: 0.52 };
        let cNow = { re: -0.38, im: 0.52 };
        let roots = [];
        let rootTrail = [];
        let pins = [];
        let frame = 0;
        let lastRender = 0;
        let accent = colors[0];

        function mulberry(value) {
          return function next() {
            value |= 0;
            value = value + 0x6D2B79F5 | 0;
            let t = Math.imul(value ^ value >>> 15, 1 | value);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
          };
        }

        function readSeed() {
          const parsed = Number(seedInput.value.replace(/\D/g, "").slice(0, 8));
          seed = parsed || 2491;
          seedInput.value = String(seed).padStart(5, "0");
          rand = mulberry(seed);
          accent = colors[Math.floor(rand() * colors.length)];
          root.style.setProperty("--accent", accent);
          planeNote.textContent = rand() > 0.5 ? "phase portrait with modulus contours" : "roots moving through a cubic surface";
        }

        function add(a, b) {
          return { re: a.re + b.re, im: a.im + b.im };
        }

        function sub(a, b) {
          return { re: a.re - b.re, im: a.im - b.im };
        }

        function mul(a, b) {
          return { re: a.re * b.re - a.im * b.im, im: a.re * b.im + a.im * b.re };
        }

        function div(a, b) {
          const d = b.re * b.re + b.im * b.im || 1e-9;
          return { re: (a.re * b.re + a.im * b.im) / d, im: (a.im * b.re - a.re * b.im) / d };
        }

        function abs(a) {
          return Math.hypot(a.re, a.im);
        }

        function poly(z, c) {
          const z2 = mul(z, z);
          const z3 = mul(z2, z);
          return add(add(z3, mul(c, z)), { re: -1, im: 0 });
        }

        function solveRoots(c) {
          let r = [
            { re: 1.1, im: 0.1 },
            { re: -0.58, im: 0.94 },
            { re: -0.52, im: -0.88 }
          ];

          for (let iter = 0; iter < 16; iter += 1) {
            r = r.map((value, index) => {
              let denom = { re: 1, im: 0 };
              for (let j = 0; j < r.length; j += 1) {
                if (j !== index) denom = mul(denom, sub(value, r[j]));
              }
              return sub(value, div(poly(value, c), denom));
            });
          }

          return r.sort((a, b) => a.re - b.re);
        }

        function formatComplex(z) {
          const re = Math.abs(z.re) < 0.001 ? 0 : z.re;
          const im = Math.abs(z.im) < 0.001 ? 0 : z.im;
          const sign = im < 0 ? "-" : "+";
          return `${re.toFixed(3)} ${sign} ${Math.abs(im).toFixed(3)}i`;
        }

        function mapToComplex(px, py, w, h) {
          return {
            re: (px / Math.max(1, w - 1) - 0.5) * domainWidth,
            im: (0.5 - py / Math.max(1, h - 1)) * domainHeight
          };
        }

        function complexToScreen(z) {
          return {
            x: (z.re / domainWidth + 0.5) * width,
            y: (0.5 - z.im / domainHeight) * height
          };
        }

        function hsv(h, s, v) {
          const i = Math.floor(h * 6);
          const f = h * 6 - i;
          const p = v * (1 - s);
          const q = v * (1 - f * s);
          const t = v * (1 - (1 - f) * s);
          const m = i % 6;
          let r = v;
          let g = t;
          let b = p;
          if (m === 1) { r = q; g = v; b = p; }
          if (m === 2) { r = p; g = v; b = t; }
          if (m === 3) { r = p; g = q; b = v; }
          if (m === 4) { r = t; g = p; b = v; }
          if (m === 5) { r = v; g = p; b = q; }
          return [r * 255, g * 255, b * 255];
        }

        function renderField(time) {
          const w = buffer.width;
          const h = buffer.height;
          const data = image.data;
          let index = 0;
          const timeDrift = reducedMotion ? 0 : Math.sin(time * 0.00025) * 0.025;

          for (let py = 0; py < h; py += 1) {
            for (let px = 0; px < w; px += 1) {
              const z = mapToComplex(px, py, w, h);
              const fz = poly(z, { re: cNow.re + timeDrift, im: cNow.im - timeDrift });
              const magnitude = abs(fz);
              const arg = Math.atan2(fz.im, fz.re);
              const hue = (arg / tau + 1) % 1;
              const logMag = Math.log(magnitude + 0.0006);
              const phaseLine = Math.pow(0.5 + 0.5 * Math.cos(10 * arg), 10);
              const modLine = Math.pow(0.5 + 0.5 * Math.cos(8 * logMag), 12);
              const zeroGlow = Math.exp(-magnitude * 2.4);
              const sat = 0.34 + zeroGlow * 0.34;
              const val = 0.72 + phaseLine * 0.18 + modLine * 0.18 + zeroGlow * 0.16;
              const rgb = hsv(hue, sat, Math.min(1, val));
              const paperMix = 0.16;
              data[index] = rgb[0] * (1 - paperMix) + 243 * paperMix;
              data[index + 1] = rgb[1] * (1 - paperMix) + 238 * paperMix;
              data[index + 2] = rgb[2] * (1 - paperMix) + 228 * paperMix;
              data[index + 3] = 255;
              index += 4;
            }
          }
          bctx.putImageData(image, 0, 0);
          ctx.imageSmoothingEnabled = true;
          ctx.drawImage(buffer, 0, 0, width, height);
        }

        function drawGrid() {
          ctx.save();
          ctx.globalAlpha = 0.34;
          ctx.strokeStyle = "#100f0c";
          ctx.lineWidth = 1;
          const step = width < 620 ? 52 : 68;
          for (let x = width / 2 % step; x < width; x += step) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, height);
            ctx.stroke();
          }
          for (let y = height / 2 % step; y < height; y += step) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(width, y);
            ctx.stroke();
          }
          ctx.globalAlpha = 0.7;
          ctx.strokeStyle = "#100f0c";
          ctx.beginPath();
          ctx.moveTo(0, height / 2);
          ctx.lineTo(width, height / 2);
          ctx.moveTo(width / 2, 0);
          ctx.lineTo(width / 2, height);
          ctx.stroke();
          ctx.restore();
        }

        function drawRootTrails() {
          ctx.save();
          ctx.lineWidth = 1.5;
          for (let rootIndex = 0; rootIndex < 3; rootIndex += 1) {
            ctx.beginPath();
            let started = false;
            rootTrail.forEach((snapshot) => {
              const rootPoint = snapshot[rootIndex];
              if (!rootPoint) return;
              const point = complexToScreen(rootPoint);
              if (!started) {
                ctx.moveTo(point.x, point.y);
                started = true;
              } else {
                ctx.lineTo(point.x, point.y);
              }
            });
            ctx.globalAlpha = 0.38;
            ctx.strokeStyle = colors[(rootIndex + 1) % colors.length];
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawPins() {
          ctx.save();
          pins.forEach((pin) => {
            pin.roots.forEach((rootPoint, index) => {
              const point = complexToScreen(rootPoint);
              ctx.globalAlpha = 0.72;
              ctx.strokeStyle = colors[(index + 3) % colors.length];
              ctx.lineWidth = 1.5;
              ctx.beginPath();
              ctx.arc(point.x, point.y, 11, 0, tau);
              ctx.stroke();
              ctx.globalAlpha = 0.36;
              ctx.beginPath();
              ctx.moveTo(point.x - 18, point.y);
              ctx.lineTo(point.x + 18, point.y);
              ctx.moveTo(point.x, point.y - 18);
              ctx.lineTo(point.x, point.y + 18);
              ctx.stroke();
            });
          });
          ctx.restore();
        }

        function drawRoots() {
          ctx.save();
          roots.forEach((rootPoint, index) => {
            const point = complexToScreen(rootPoint);
            ctx.globalAlpha = 0.95;
            ctx.fillStyle = colors[(index + 1) % colors.length];
            ctx.strokeStyle = "#100f0c";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(point.x, point.y, 6, 0, tau);
            ctx.fill();
            ctx.stroke();
            ctx.globalAlpha = 0.42;
            ctx.beginPath();
            ctx.arc(point.x, point.y, 19, 0, tau);
            ctx.stroke();
          });
          ctx.restore();
        }

        function drawPointer() {
          if (!pointer.active) return;
          ctx.save();
          ctx.globalAlpha = 0.86;
          ctx.strokeStyle = "#100f0c";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(pointer.x - 14, pointer.y);
          ctx.lineTo(pointer.x + 14, pointer.y);
          ctx.moveTo(pointer.x, pointer.y - 14);
          ctx.lineTo(pointer.x, pointer.y + 14);
          ctx.stroke();
          ctx.globalAlpha = 0.45;
          ctx.strokeStyle = accent;
          ctx.beginPath();
          ctx.arc(pointer.x, pointer.y, 24, 0, tau);
          ctx.stroke();
          ctx.restore();
        }

        function drawLabels() {
          ctx.save();
          ctx.globalAlpha = 0.22;
          ctx.fillStyle = "#100f0c";
          ctx.font = `${width < 620 ? 64 : width < 920 ? 104 : 156}px Georgia, Times New Roman, serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("dinguerie", width * 0.5, height * 0.5);
          ctx.restore();
        }

        function discriminantFor(c) {
          const c2 = mul(c, c);
          const c3 = mul(c2, c);
          return { re: -4 * c3.re - 27, im: -4 * c3.im };
        }

        function updateReadouts() {
          constant.textContent = formatComplex(cNow);
          discriminant.textContent = formatComplex(discriminantFor(cNow));
          roots.forEach((rootPoint, index) => {
            rootLabels[index].textContent = formatComplex(rootPoint);
          });
        }

        function resize() {
          ratio = Math.min(devicePixelRatio || 1, 1.5);
          width = innerWidth;
          height = innerHeight;
          canvas.width = Math.round(width * ratio);
          canvas.height = Math.round(height * ratio);
          ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
          bufferScale = width < 620 ? 6 : 6;
          buffer.width = Math.max(120, Math.round(width / bufferScale));
          buffer.height = Math.max(120, Math.round(height / bufferScale));
          image = bctx.createImageData(buffer.width, buffer.height);
          domainHeight = width < 620 ? 4.6 : 3.7;
          domainWidth = domainHeight * width / height;
        }

        function tick(time = performance.now()) {
          if (!pointer.active && !reducedMotion) {
            cTarget = {
              re: Math.cos(time * 0.00016 + seed * 0.001) * 0.72 - 0.18,
              im: Math.sin(time * 0.00014 + seed * 0.0013) * 0.62
            };
          }

          cNow.re += (cTarget.re - cNow.re) * 0.12;
          cNow.im += (cTarget.im - cNow.im) * 0.12;

          if (time - lastRender > (reducedMotion ? 700 : 240)) {
            roots = solveRoots(cNow);
            rootTrail.push(roots.map((rootPoint) => ({ re: rootPoint.re, im: rootPoint.im })));
            while (rootTrail.length > 84) rootTrail.shift();

            renderField(time);
            drawGrid();
            drawLabels();
            drawRootTrails();
            drawPins();
            drawRoots();
            drawPointer();
            updateReadouts();
            lastRender = time;
          }
          frame = setTimeout(() => tick(performance.now()), reducedMotion ? 700 : 160);
        }

        addEventListener("resize", resize, { passive: true });
        addEventListener("pointermove", (event) => {
          pointer = { x: event.clientX, y: event.clientY, active: true };
          cTarget = {
            re: (event.clientX / width - 0.5) * 2.9,
            im: (0.5 - event.clientY / height) * 1.95
          };
        }, { passive: true });
        addEventListener("pointerleave", () => {
          pointer.active = false;
        }, { passive: true });
        addEventListener("click", (event) => {
          if (event.target.closest("button, input, a")) return;
          pins.push({ c: { re: cNow.re, im: cNow.im }, roots: roots.map((rootPoint) => ({ re: rootPoint.re, im: rootPoint.im })) });
          while (pins.length > 5) pins.shift();
        }, { passive: true });

        clearButton.addEventListener("click", () => {
          pins = [];
          rootTrail = [];
        });

        seedInput.addEventListener("change", () => {
          readSeed();
          rootTrail = [];
          pins = [];
        });
        seedInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") seedInput.blur();
        });

        document.addEventListener("visibilitychange", () => {
          clearTimeout(frame);
          if (!document.hidden) frame = setTimeout(() => tick(performance.now()), 120);
        });

        readSeed();
        resize();
        tick();
      })();
    </script>
  </body>
</html>
