<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="dinguerie is a living field instrument.">
    <meta name="theme-color" content="#f3eee4">
    <meta property="og:title" content="dinguerie">
    <meta property="og:description" content="A living field instrument.">
    <meta property="og:type" content="website">
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23100f0c'/%3E%3Ccircle cx='32' cy='32' r='18' fill='none' stroke='%23f3eee4' stroke-width='4'/%3E%3Cpath d='M14 32h36M32 14v36' stroke='%23c8ff45' stroke-width='4' stroke-linecap='square'/%3E%3C/svg%3E"
    >
    <title>dinguerie</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f3eee4;
        --paper-hot: #fffaf0;
        --ink: #100f0c;
        --soft: #766d61;
        --line: rgba(16, 15, 12, 0.18);
        --line-strong: rgba(16, 15, 12, 0.38);
        --blue: #2454ff;
        --red: #ff4f35;
        --green: #baff39;
        --mint: #38d0aa;
        --gold: #d4a321;
        --violet: #7e69ff;
        --accent: var(--blue);
        --mono: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", monospace;
        --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --serif: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      button,
      input,
      a {
        font: inherit;
      }

      button,
      input {
        color: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      ::selection {
        background: var(--ink);
        color: var(--paper);
      }

      :focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 4px;
      }

      .instrument {
        position: fixed;
        inset: 0;
        isolation: isolate;
        background:
          linear-gradient(90deg, rgba(16, 15, 12, 0.035) 1px, transparent 1px),
          linear-gradient(0deg, rgba(16, 15, 12, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 50% 48%, var(--paper-hot), var(--paper) 52%, #d8cfc0 100%);
        background-size: 34px 34px, 34px 34px, 100% 100%;
      }

      #field {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }

      .plate {
        position: absolute;
        inset: 5.2rem 4.2rem 5.8rem;
        z-index: 2;
        border: 1px solid var(--line);
        pointer-events: none;
      }

      .plate::before,
      .plate::after {
        position: absolute;
        content: "";
      }

      .plate::before {
        inset: 50% 0 auto;
        border-top: 1px solid rgba(36, 84, 255, 0.22);
      }

      .plate::after {
        inset: 0 auto 0 50%;
        border-left: 1px solid rgba(36, 84, 255, 0.18);
      }

      .coil {
        position: absolute;
        z-index: 2;
        width: 12rem;
        aspect-ratio: 1;
        border: 1px solid rgba(16, 15, 12, 0.14);
        border-radius: 50%;
        pointer-events: none;
      }

      .coil::before,
      .coil::after {
        position: absolute;
        inset: 12%;
        border: 1px solid rgba(16, 15, 12, 0.12);
        border-radius: inherit;
        content: "";
      }

      .coil::after {
        inset: 27%;
      }

      .coil-a {
        top: 15%;
        left: 11%;
      }

      .coil-b {
        right: 13%;
        bottom: 18%;
      }

      .chrome {
        position: fixed;
        inset: 0 0 auto;
        z-index: 5;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.3rem;
        pointer-events: none;
      }

      .brand,
      .state,
      .seed {
        pointer-events: auto;
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 850;
      }

      .brand {
        justify-self: start;
        color: var(--ink);
        text-decoration: none;
      }

      .brand::before {
        display: inline-block;
        width: 0.72rem;
        height: 0.72rem;
        margin-right: 0.62rem;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: inset 0 0 0 2px var(--ink);
        content: "";
        vertical-align: -0.08rem;
      }

      .state {
        justify-self: center;
        min-width: 11rem;
        padding: 0.52rem 0.72rem;
        border: 1px solid var(--line);
        background: rgba(243, 238, 228, 0.78);
        backdrop-filter: blur(16px);
        text-align: center;
        text-transform: uppercase;
      }

      .seed {
        justify-self: end;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        color: var(--soft);
        text-transform: uppercase;
      }

      .seed input {
        width: 5.2rem;
        border: 0;
        border-bottom: 1px solid var(--line-strong);
        border-radius: 0;
        outline: 0;
        background: transparent;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 850;
        text-align: right;
      }

      .title {
        position: fixed;
        z-index: 3;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
      }

      h1 {
        margin: 0;
        color: rgba(16, 15, 12, 0.78);
        font-family: var(--serif);
        font-size: 9rem;
        font-weight: 500;
        line-height: 0.9;
        text-shadow:
          0 0 1px rgba(243, 238, 228, 0.8),
          0 0 28px rgba(243, 238, 228, 0.72);
      }

      .annotations {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
      }

      .annotation {
        position: absolute;
        max-width: 14rem;
        padding-top: 0.55rem;
        border-top: 1px solid var(--line-strong);
        color: rgba(16, 15, 12, 0.74);
        font-family: var(--mono);
        font-size: 0.66rem;
        font-weight: 820;
        line-height: 1.35;
        text-transform: uppercase;
      }

      .annotation::before {
        position: absolute;
        top: -0.34rem;
        left: 0;
        width: 0.62rem;
        height: 0.62rem;
        background: var(--accent);
        box-shadow: inset 0 0 0 1px var(--ink);
        content: "";
      }

      .annotation-a {
        top: 21%;
        left: 7%;
      }

      .annotation-b {
        top: 18%;
        right: 8%;
      }

      .annotation-c {
        right: 9%;
        bottom: 21%;
      }

      .panel {
        position: fixed;
        inset: auto 1.3rem 1.15rem;
        z-index: 5;
        display: grid;
        grid-template-columns: minmax(14rem, 24rem) auto;
        gap: 1rem;
        align-items: end;
        pointer-events: none;
      }

      .meters {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        border: 1px solid var(--line);
        background: var(--line);
        box-shadow: 10px 10px 0 rgba(16, 15, 12, 0.08);
        pointer-events: auto;
      }

      .meter {
        min-height: 5.3rem;
        padding: 0.78rem;
        background: rgba(243, 238, 228, 0.84);
        backdrop-filter: blur(18px);
      }

      .meter span {
        display: block;
        color: var(--soft);
        font-family: var(--mono);
        font-size: 0.62rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .meter strong {
        display: block;
        margin-top: 0.78rem;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 1rem;
        font-weight: 850;
      }

      .controls {
        justify-self: end;
        display: grid;
        grid-template-columns: repeat(2, 3rem);
        gap: 0.42rem;
        padding: 0.42rem;
        border: 1px solid var(--line);
        background: rgba(243, 238, 228, 0.84);
        backdrop-filter: blur(18px);
        box-shadow: 10px 10px 0 rgba(16, 15, 12, 0.08);
        pointer-events: auto;
      }

      .control {
        display: grid;
        width: 3rem;
        height: 3rem;
        place-items: center;
        border: 1px solid transparent;
        background: transparent;
        transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
      }

      .control:hover {
        border-color: var(--line-strong);
        background: var(--paper-hot);
      }

      .control:active {
        transform: translateY(2px);
      }

      .control-primary {
        border-color: var(--ink);
        background: var(--accent);
      }

      .icon {
        position: relative;
        display: block;
        width: 1.34rem;
        height: 1.34rem;
      }

      .icon::before,
      .icon::after {
        position: absolute;
        content: "";
      }

      .icon-pulse {
        border: 2px solid var(--ink);
        border-radius: 50%;
      }

      .icon-pulse::before {
        inset: 0.25rem;
        border: 2px solid var(--ink);
        border-radius: inherit;
      }

      .icon-reset {
        border-top: 2px solid var(--ink);
        border-left: 2px solid var(--ink);
        border-radius: 50%;
        rotate: -28deg;
      }

      .icon-reset::before {
        right: -0.16rem;
        bottom: 0.05rem;
        width: 0.45rem;
        height: 0.45rem;
        border-right: 2px solid var(--ink);
        border-bottom: 2px solid var(--ink);
        rotate: 10deg;
      }

      .caption {
        position: fixed;
        left: 50%;
        bottom: 1.85rem;
        z-index: 4;
        translate: -50% 0;
        width: min(35rem, calc(100vw - 2rem));
        color: rgba(16, 15, 12, 0.72);
        font-family: var(--mono);
        font-size: 0.66rem;
        font-weight: 820;
        line-height: 1.35;
        text-align: center;
        text-transform: uppercase;
        pointer-events: none;
      }

      @media (max-width: 900px) {
        .chrome {
          grid-template-columns: 1fr auto;
        }

        .state {
          display: none;
        }

        .annotation {
          display: none;
        }

        .plate {
          inset: 4.5rem 1rem 7.4rem;
        }

        h1 {
          font-size: 6rem;
        }

        .panel {
          grid-template-columns: 1fr auto;
        }

        .caption {
          display: none;
        }
      }

      @media (max-width: 560px) {
        .chrome {
          padding: 0.85rem;
        }

        .seed span {
          display: none;
        }

        h1 {
          font-size: 3.8rem;
        }

        .coil {
          width: 8rem;
        }

        .panel {
          inset: auto 0.85rem 0.85rem;
          grid-template-columns: 1fr;
        }

        .meters {
          grid-template-columns: repeat(3, 1fr);
        }

        .meter {
          min-height: 4.2rem;
          padding: 0.62rem;
        }

        .meter strong {
          margin-top: 0.56rem;
          font-size: 0.9rem;
        }

        .controls {
          justify-self: stretch;
          grid-template-columns: repeat(2, 1fr);
        }

        .control {
          width: auto;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="instrument" id="top" aria-label="dinguerie">
      <canvas id="field" aria-hidden="true"></canvas>
      <div class="plate" aria-hidden="true"></div>
      <div class="coil coil-a" aria-hidden="true"></div>
      <div class="coil coil-b" aria-hidden="true"></div>

      <header class="chrome">
        <a class="brand" href="#top">dinguerie</a>
        <div class="state" id="state">field coherent</div>
        <label class="seed">
          <span>seed</span>
          <input id="seed" value="02491" aria-label="Seed">
        </label>
      </header>

      <section class="title" aria-labelledby="title">
        <h1 id="title">dinguerie</h1>
      </section>

      <div class="annotations" aria-hidden="true">
        <p class="annotation annotation-a" id="annotation-a">the probe bends the room before it touches it</p>
        <p class="annotation annotation-b" id="annotation-b">a private storm in a calibrated box</p>
        <p class="annotation annotation-c" id="annotation-c">every line is trying to find the same voltage</p>
      </div>

      <p class="caption" id="caption">move the probe through the field, click to leave a charge</p>

      <section class="panel" aria-label="Readings and controls">
        <div class="meters" aria-live="polite">
          <div class="meter">
            <span>voltage</span>
            <strong id="voltage">0.00</strong>
          </div>
          <div class="meter">
            <span>frequency</span>
            <strong id="frequency">0.00</strong>
          </div>
          <div class="meter">
            <span>phase</span>
            <strong id="phase">calm</strong>
          </div>
        </div>

        <nav class="controls" aria-label="Controls">
          <button class="control control-primary" type="button" id="pulse" aria-label="Pulse" title="Pulse">
            <span class="icon icon-pulse" aria-hidden="true"></span>
          </button>
          <button class="control" type="button" id="reset" aria-label="Reset" title="Reset">
            <span class="icon icon-reset" aria-hidden="true"></span>
          </button>
        </nav>
      </section>
    </main>

    <script>
      (() => {
        const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
        const root = document.documentElement;
        const canvas = document.querySelector("#field");
        const ctx = canvas.getContext("2d", { alpha: false });
        const seedInput = document.querySelector("#seed");
        const state = document.querySelector("#state");
        const voltage = document.querySelector("#voltage");
        const frequency = document.querySelector("#frequency");
        const phase = document.querySelector("#phase");
        const pulse = document.querySelector("#pulse");
        const reset = document.querySelector("#reset");
        const caption = document.querySelector("#caption");
        const annotations = [
          document.querySelector("#annotation-a"),
          document.querySelector("#annotation-b"),
          document.querySelector("#annotation-c")
        ];

        const colors = ["#2454ff", "#ff4f35", "#baff39", "#38d0aa", "#7e69ff", "#d4a321"];
        const notes = [
          "the probe bends the room before it touches it",
          "a private storm in a calibrated box",
          "every line is trying to find the same voltage",
          "old electricity, new weather",
          "the word hums before it becomes readable",
          "a diagram that refuses to stay still",
          "magnetism pretending to be typography",
          "the field keeps a memory of your hand"
        ];
        const captions = [
          "move the probe through the field, click to leave a charge",
          "a word held inside an electromagnetic weather map",
          "small changes in pressure redraw the whole room",
          "touch the plate and the instrument answers"
        ];

        let width = 1;
        let height = 1;
        let ratio = 1;
        let seed = 2491;
        let rand = mulberry(seed);
        let charges = [];
        let traces = [];
        let frame = 0;
        let lastDraw = 0;
        let pulseEnergy = 0.35;
        let pointer = { x: 0, y: 0, active: false, down: false, charge: 1.1 };
        let accent = colors[0];

        function mulberry(value) {
          return function next() {
            value |= 0;
            value = value + 0x6D2B79F5 | 0;
            let t = Math.imul(value ^ value >>> 15, 1 | value);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
          };
        }

        function clamp(value, min, max) {
          return Math.min(max, Math.max(min, value));
        }

        function readSeed() {
          const parsed = Number(seedInput.value.replace(/\D/g, "").slice(0, 8));
          seed = parsed || 2491;
          seedInput.value = String(seed).padStart(5, "0");
          rand = mulberry(seed);
        }

        function resetField(changeSeed = false) {
          if (changeSeed) {
            seed = 10000 + Math.floor(Math.random() * 89999);
            seedInput.value = String(seed);
          }
          readSeed();
          accent = colors[Math.floor(rand() * colors.length)];
          root.style.setProperty("--accent", accent);
          charges = [
            { x: width * (0.23 + rand() * 0.08), y: height * (0.38 + rand() * 0.2), q: 1.15, life: 1, fixed: true },
            { x: width * (0.74 + rand() * 0.08), y: height * (0.34 + rand() * 0.22), q: -1.05, life: 1, fixed: true },
            { x: width * (0.48 + rand() * 0.1), y: height * (0.58 + rand() * 0.12), q: 0.72, life: 1, fixed: true }
          ];
          traces = makeSeeds();
          updateText();
          pulseEnergy = 0.52;
        }

        function updateText() {
          const start = Math.floor(rand() * notes.length);
          annotations.forEach((annotation, index) => {
            annotation.textContent = notes[(start + index * 2) % notes.length];
          });
          caption.textContent = captions[Math.floor(rand() * captions.length)];
        }

        function makeSeeds() {
          const count = width < 680 ? 74 : 128;
          const list = [];
          const golden = Math.PI * (3 - Math.sqrt(5));
          const radiusMax = Math.min(width, height) * 0.45;
          for (let i = 0; i < count; i += 1) {
            const radius = Math.sqrt((i + 0.5) / count) * radiusMax;
            const angle = i * golden + rand() * 0.3;
            list.push({
              x: width * 0.5 + Math.cos(angle) * radius * (1.55 + rand() * 0.2),
              y: height * 0.5 + Math.sin(angle) * radius * (0.88 + rand() * 0.18),
              phase: rand() * Math.PI * 2,
              hue: Math.floor(rand() * colors.length)
            });
          }
          return list;
        }

        function resize() {
          ratio = Math.min(devicePixelRatio || 1, 1.55);
          width = innerWidth;
          height = innerHeight;
          canvas.width = Math.round(width * ratio);
          canvas.height = Math.round(height * ratio);
          ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
          resetField(false);
        }

        function fieldAt(x, y, time) {
          let vx = 0;
          let vy = 0;
          const allCharges = charges.slice();
          if (pointer.active) allCharges.push({ x: pointer.x, y: pointer.y, q: pointer.down ? -1.7 : pointer.charge, life: 1 });

          allCharges.forEach((charge) => {
            const dx = x - charge.x;
            const dy = y - charge.y;
            const d2 = dx * dx + dy * dy + 1200;
            const force = charge.q * charge.life * 8200 / d2;
            vx += dx * force / Math.sqrt(d2);
            vy += dy * force / Math.sqrt(d2);
          });

          const waveA = Math.sin(y * 0.012 + time * 0.0008 + seed * 0.01);
          const waveB = Math.cos(x * 0.009 - time * 0.0007);
          vx += waveA * (0.58 + pulseEnergy * 0.4);
          vy += waveB * (0.48 + pulseEnergy * 0.35);

          const curl = Math.sin((x + y) * 0.004 + time * 0.0006);
          vx += -curl * 0.44;
          vy += curl * 0.44;

          const mag = Math.hypot(vx, vy) || 1;
          return { x: vx / mag, y: vy / mag, mag };
        }

        function drawBackground(time) {
          const gradient = ctx.createRadialGradient(width * 0.5, height * 0.48, 20, width * 0.5, height * 0.52, Math.max(width, height) * 0.75);
          gradient.addColorStop(0, "#fffaf0");
          gradient.addColorStop(0.5, "#f3eee4");
          gradient.addColorStop(1, "#d7cdbd");
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, width, height);

          ctx.globalAlpha = 0.28;
          ctx.strokeStyle = "#100f0c";
          ctx.lineWidth = 1;
          const grid = width < 560 ? 42 : 56;
          for (let x = (time * 0.006) % grid; x < width; x += grid) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, height);
            ctx.stroke();
          }
          for (let y = 0; y < height; y += grid) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(width, y);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }

        function drawWordMask() {
          const size = width < 560 ? 64 : width < 900 ? 112 : 170;
          ctx.save();
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `${size}px Georgia, Times New Roman, serif`;
          ctx.globalAlpha = 0.045;
          ctx.fillStyle = "#100f0c";
          ctx.fillText("dinguerie", width * 0.5, height * 0.5);
          ctx.globalAlpha = 0.12;
          ctx.lineWidth = 1;
          ctx.strokeStyle = accent;
          ctx.strokeText("dinguerie", width * 0.5, height * 0.5);
          ctx.restore();
        }

        function drawStreamline(seedPoint, time, direction) {
          let x = seedPoint.x + Math.sin(time * 0.0003 + seedPoint.phase) * 8;
          let y = seedPoint.y + Math.cos(time * 0.0004 + seedPoint.phase) * 6;
          const maxSteps = width < 680 ? 42 : 58;
          const stepLength = width < 680 ? 9 : 11;
          ctx.beginPath();
          ctx.moveTo(x, y);
          let strength = 0;

          for (let i = 0; i < maxSteps; i += 1) {
            const vector = fieldAt(x, y, time);
            strength += vector.mag;
            x += vector.x * stepLength * direction;
            y += vector.y * stepLength * direction;
            if (x < -40 || x > width + 40 || y < -40 || y > height + 40) break;
            ctx.lineTo(x, y);
          }

          const alpha = clamp(0.04 + strength / maxSteps * 0.04, 0.04, 0.22);
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = colors[seedPoint.hue];
          ctx.stroke();
        }

        function drawCharges(time) {
          const allCharges = charges.slice();
          if (pointer.active) allCharges.push({ x: pointer.x, y: pointer.y, q: pointer.down ? -1.7 : pointer.charge, life: 1, probe: true });

          allCharges.forEach((charge) => {
            const radius = charge.probe ? 22 + Math.sin(time * 0.008) * 3 : 13 + Math.abs(charge.q) * 5;
            ctx.globalAlpha = charge.probe ? 0.9 : 0.6 * charge.life;
            ctx.strokeStyle = charge.q > 0 ? accent : "#ff4f35";
            ctx.lineWidth = charge.probe ? 2 : 1.5;
            ctx.beginPath();
            ctx.arc(charge.x, charge.y, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = charge.probe ? 0.75 : 0.55 * charge.life;
            ctx.fillStyle = charge.q > 0 ? accent : "#ff4f35";
            ctx.fillRect(charge.x - 3, charge.y - 3, 6, 6);
          });
          ctx.globalAlpha = 1;
        }

        function draw(time = 0) {
          if (time - lastDraw < 32 && !reducedMotion) {
            frame = requestAnimationFrame(draw);
            return;
          }
          lastDraw = time;

          drawBackground(time);
          drawWordMask();

          ctx.lineWidth = 1.1;
          traces.forEach((trace, index) => {
            drawStreamline(trace, time, 1);
            if (index % 3 === 0) drawStreamline(trace, time, -1);
          });

          drawCharges(time);

          if (!reducedMotion) {
            charges.forEach((charge) => {
              if (!charge.fixed) charge.life *= 0.986;
            });
            charges = charges.filter((charge) => charge.fixed || charge.life > 0.08);
            pulseEnergy = Math.max(0.18, pulseEnergy * 0.982);
          }

          const probe = pointer.active ? fieldAt(pointer.x, pointer.y, time).mag : 0;
          voltage.textContent = (probe * 2.4 + pulseEnergy * 1.3).toFixed(2);
          frequency.textContent = (charges.length * 3.7 + pulseEnergy * 12).toFixed(1);
          phase.textContent = pointer.down ? "inverted" : charges.length > 3 ? "charged" : "calm";
          state.textContent = pulseEnergy > 0.55 ? "field disturbed" : "field coherent";
          frame = requestAnimationFrame(draw);
        }

        function addCharge(x, y, q = 1) {
          charges.push({ x, y, q, life: 1, fixed: false });
          while (charges.length > 9) {
            const index = charges.findIndex((charge) => !charge.fixed);
            if (index === -1) break;
            charges.splice(index, 1);
          }
          pulseEnergy = 1.2;
        }

        pulse.addEventListener("click", () => {
          addCharge(width * 0.5, height * 0.5, rand() > 0.5 ? 1.4 : -1.4);
        });

        reset.addEventListener("click", () => resetField(true));

        seedInput.addEventListener("change", () => resetField(false));
        seedInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") resetField(false);
        });

        addEventListener("resize", resize, { passive: true });
        addEventListener("pointermove", (event) => {
          pointer.x = event.clientX;
          pointer.y = event.clientY;
          pointer.active = true;
        }, { passive: true });
        addEventListener("pointerdown", (event) => {
          pointer.down = true;
          addCharge(event.clientX, event.clientY, -1.35);
        }, { passive: true });
        addEventListener("pointerup", () => {
          pointer.down = false;
        }, { passive: true });
        addEventListener("pointerleave", () => {
          pointer.active = false;
          pointer.down = false;
        }, { passive: true });
        document.addEventListener("visibilitychange", () => {
          cancelAnimationFrame(frame);
          if (!document.hidden) frame = requestAnimationFrame(draw);
        });

        resize();
        draw();
      })();
    </script>
  </body>
</html>
