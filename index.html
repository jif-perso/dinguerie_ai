<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DinguerieAI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: 4em;
            margin-bottom: 0.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeIn 2s ease-in-out;
        }

        p {
            font-size: 1.5em;
            margin-bottom: 1em;
            animation: fadeIn 2s ease-in-out 0.5s;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.8;
            animation: fadeIn 2s ease-in-out 1s;
            animation-fill-mode: forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DinguerieAI</h1>
        <p>Unlocking the future of artificial intelligence</p>
        <p class="subtitle">Innovative solutions powered by cutting-edge AI technology</p>
    </div>
</body>
</html>
