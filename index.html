<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="dinguerie is a 3D geodesic surface.">
    <meta name="theme-color" content="#f3eee4">
    <meta property="og:title" content="dinguerie">
    <meta property="og:description" content="A 3D geodesic surface.">
    <meta property="og:type" content="website">
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23100f0c'/%3E%3Cpath d='M7 45C19 12 41 55 57 20' fill='none' stroke='%23f3eee4' stroke-width='5' stroke-linecap='square'/%3E%3Cpath d='M11 40C28 20 39 48 53 28' fill='none' stroke='%23baff39' stroke-width='5' stroke-linecap='square'/%3E%3C/svg%3E"
    >
    <title>dinguerie</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f3eee4;
        --paper-hot: #fffaf0;
        --ink: #100f0c;
        --soft: #6e665c;
        --line: rgba(16, 15, 12, 0.18);
        --line-strong: rgba(16, 15, 12, 0.42);
        --blue: #2454ff;
        --red: #ff4f35;
        --green: #baff39;
        --mint: #38d0aa;
        --gold: #d4a321;
        --violet: #7e69ff;
        --mono: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", monospace;
        --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --serif: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      a,
      button {
        color: inherit;
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      ::selection {
        background: var(--ink);
        color: var(--paper);
      }

      :focus-visible {
        outline: 3px solid var(--green);
        outline-offset: 4px;
      }

      .surface-lab {
        position: fixed;
        inset: 0;
        isolation: isolate;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(16, 15, 12, 0.038) 1px, transparent 1px),
          linear-gradient(0deg, rgba(16, 15, 12, 0.038) 1px, transparent 1px),
          radial-gradient(circle at 50% 56%, var(--paper-hot), var(--paper) 58%, #d6cbbb 100%);
        background-size: 34px 34px, 34px 34px, 100% 100%;
      }

      #scene {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        cursor: crosshair;
        touch-action: none;
      }

      .chrome {
        position: fixed;
        inset: 0 0 auto;
        z-index: 3;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 1rem;
        align-items: center;
        padding: 1rem 1.25rem;
        pointer-events: none;
      }

      .brand,
      .formula,
      .readout {
        pointer-events: auto;
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 850;
      }

      .brand {
        justify-self: start;
        text-decoration: none;
      }

      .brand::before {
        display: inline-block;
        width: 0.72rem;
        height: 0.72rem;
        margin-right: 0.62rem;
        background: var(--green);
        box-shadow: inset 0 0 0 2px var(--ink);
        content: "";
        vertical-align: -0.08rem;
      }

      .formula {
        justify-self: center;
        min-width: 28rem;
        padding: 0.55rem 0.78rem;
        border: 1px solid var(--line);
        background: rgba(243, 238, 228, 0.9);
        text-align: center;
      }

      .readout {
        justify-self: end;
        color: var(--soft);
        text-align: right;
        text-transform: uppercase;
      }

      .panel {
        position: fixed;
        right: 1.25rem;
        bottom: 1.15rem;
        z-index: 3;
        display: grid;
        width: min(30rem, calc(100vw - 2.5rem));
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        border: 1px solid var(--line);
        background: var(--line);
        box-shadow: 10px 10px 0 rgba(16, 15, 12, 0.08);
      }

      .cell {
        min-height: 4.3rem;
        padding: 0.72rem;
        background: rgba(243, 238, 228, 0.92);
      }

      .cell span {
        display: block;
        color: var(--soft);
        font-family: var(--mono);
        font-size: 0.62rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .cell strong {
        display: block;
        margin-top: 0.58rem;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 0.95rem;
        font-weight: 900;
      }

      .caption {
        position: fixed;
        left: 1.25rem;
        bottom: 1.18rem;
        z-index: 3;
        width: min(31rem, calc(100vw - 2.5rem));
        color: rgba(16, 15, 12, 0.74);
        font-family: var(--mono);
        font-size: 0.66rem;
        font-weight: 850;
        line-height: 1.38;
        text-transform: uppercase;
        pointer-events: none;
      }

      .caption strong {
        display: block;
        color: var(--ink);
      }

      .actions {
        position: fixed;
        top: 4.75rem;
        right: 1.25rem;
        z-index: 3;
        display: flex;
        gap: 0.5rem;
      }

      .action {
        min-height: 2.45rem;
        padding: 0.55rem 0.75rem;
        border: 1px solid var(--line-strong);
        background: rgba(243, 238, 228, 0.9);
        font-family: var(--mono);
        font-size: 0.64rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .action:hover {
        background: var(--paper-hot);
      }

      @media (max-width: 920px) {
        .chrome {
          grid-template-columns: 1fr auto;
          padding: 0.85rem;
        }

        .formula {
          display: none;
        }

        .panel {
          right: 0.85rem;
          bottom: 0.85rem;
          width: min(22rem, calc(100vw - 1.7rem));
          grid-template-columns: 1fr;
        }

        .caption {
          left: 0.85rem;
          bottom: 14rem;
          width: min(24rem, calc(100vw - 1.7rem));
          font-size: 0.6rem;
        }

        .actions {
          top: auto;
          right: 0.85rem;
          bottom: 14.2rem;
        }
      }

      @media (max-width: 560px) {
        .readout,
        .panel {
          display: none;
        }

        .caption {
          bottom: 0.85rem;
        }

        .actions {
          left: 0.85rem;
          right: auto;
          display: grid;
          width: max-content;
          bottom: auto;
          top: 4.2rem;
          justify-items: start;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="surface-lab" id="top" aria-label="dinguerie geodesic surface">
      <canvas id="scene" aria-label="A 3D surface where two clicked points are joined by a surface shortest path"></canvas>

      <header class="chrome">
        <a class="brand" href="#top">dinguerie</a>
        <div class="formula">click two points; green stays on the surface, red cuts through space</div>
        <div class="readout" id="status">select two points</div>
      </header>

      <div class="actions">
        <button class="action" id="reset" type="button">reset</button>
        <button class="action" id="newSurface" type="button">new surface</button>
      </div>

      <section class="panel" aria-label="Path measurements">
        <div class="cell">
          <span>surface path</span>
          <strong id="surfaceLength">0.00</strong>
        </div>
        <div class="cell">
          <span>straight chord</span>
          <strong id="chordLength">0.00</strong>
        </div>
        <div class="cell">
          <span>extra distance</span>
          <strong id="extraLength">0%</strong>
        </div>
      </section>

      <p class="caption">
        <strong>Click any two points.</strong>
        The green route is an A* geodesic over the surface mesh. The red line ignores the manifold.
      </p>
    </main>

    <script type="module">
      import * as THREE from "three";

      const canvas = document.querySelector("#scene");
      const statusLabel = document.querySelector("#status");
      const surfaceLengthLabel = document.querySelector("#surfaceLength");
      const chordLengthLabel = document.querySelector("#chordLength");
      const extraLengthLabel = document.querySelector("#extraLength");
      const resetButton = document.querySelector("#reset");
      const newSurfaceButton = document.querySelector("#newSurface");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 120);
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      const surfaceSize = 13.5;
      const grid = 88;
      const spacing = surfaceSize / (grid - 1);
      const nodeCount = grid * grid;
      const up = new THREE.Vector3(0, 1, 0);
      const selected = [];
      const markers = [];
      let terrainSeed = 4.9;
      let heights = [];
      let vertices = [];
      let surfaceMesh;
      let wireMesh;
      let pathObject;
      let chordObject;
      let traveler;
      let pathPoints = [];
      let pathLength = 0;
      let chordLength = 0;
      let reveal = 1;
      let last = 0;
      let targetYaw = -0.52;
      let yaw = -0.52;
      let targetTilt = 0.78;
      let tilt = 0.78;

      scene.fog = new THREE.Fog(0xf3eee4, 16, 35);
      camera.position.set(0, 6.2, 13.2);

      const ambient = new THREE.HemisphereLight(0xfffaf0, 0x6c665b, 2.5);
      scene.add(ambient);
      const key = new THREE.DirectionalLight(0xffffff, 3.2);
      key.position.set(-5, 7, 6);
      scene.add(key);
      const rim = new THREE.DirectionalLight(0xbaff39, 1.15);
      rim.position.set(5, 3, -5);
      scene.add(rim);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(60, 60, 1, 1),
        new THREE.MeshBasicMaterial({ color: 0xf3eee4, transparent: true, opacity: 0.18 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -2.4;
      scene.add(floor);

      function terrain(x, z) {
        const s = terrainSeed;
        const ridgeDistance = x + z * 0.22;
        const ridgeEnvelope = Math.exp(-(ridgeDistance ** 2) * 1.55);
        const edgePass = 0.18 + 0.82 * (1 - Math.exp(-((Math.abs(z) - 5.65) ** 2) * 0.82));
        const wall = 5.4 * ridgeEnvelope * edgePass;
        const westBowl = -1.05 * Math.exp(-((x + 3.8) ** 2 + (z + 0.2) ** 2) * 0.18);
        const eastBowl = -0.85 * Math.exp(-((x - 3.9) ** 2 + (z - 0.1) ** 2) * 0.19);
        const saddle = 0.82 * Math.sin(x * 0.62 + s) * Math.cos(z * 0.5 - s * 0.2);
        const rib = 0.44 * Math.sin((x - z) * 1.18 + s * 1.4);
        const cap = 1.25 * Math.exp(-((x - 1.3) ** 2 + (z + 3.4) ** 2) * 0.42);
        return wall + westBowl + eastBowl + saddle + rib + cap - 0.85;
      }

      function index(i, j) {
        return j * grid + i;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function nodePosition(i, j) {
        return vertices[index(i, j)];
      }

      function pointForIndex(id) {
        return vertices[id].clone();
      }

      function makeSurface() {
        heights = new Array(nodeCount);
        vertices = new Array(nodeCount);
        const positions = new Float32Array(nodeCount * 3);
        const colors = new Float32Array(nodeCount * 3);
        const color = new THREE.Color();

        for (let j = 0; j < grid; j += 1) {
          for (let i = 0; i < grid; i += 1) {
            const x = -surfaceSize / 2 + i * spacing;
            const z = -surfaceSize / 2 + j * spacing;
            const y = terrain(x, z);
            const id = index(i, j);
            heights[id] = y;
            vertices[id] = new THREE.Vector3(x, y, z);
            positions[id * 3] = x;
            positions[id * 3 + 1] = y;
            positions[id * 3 + 2] = z;
            const t = clamp((y + 1.85) / 7.2, 0, 1);
            const hue = 0.55 - t * 0.28;
            color.setHSL(hue, 0.56, 0.6 + t * 0.18);
            colors[id * 3] = color.r;
            colors[id * 3 + 1] = color.g;
            colors[id * 3 + 2] = color.b;
          }
        }

        const indices = [];
        for (let j = 0; j < grid - 1; j += 1) {
          for (let i = 0; i < grid - 1; i += 1) {
            const a = index(i, j);
            const b = index(i + 1, j);
            const c = index(i + 1, j + 1);
            const d = index(i, j + 1);
            indices.push(a, b, d, b, c, d);
          }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();
        const material = new THREE.MeshStandardMaterial({
          vertexColors: true,
          roughness: 0.78,
          metalness: 0,
          side: THREE.DoubleSide
        });

        if (surfaceMesh) {
          scene.remove(surfaceMesh);
          surfaceMesh.geometry.dispose();
          surfaceMesh.material.dispose();
        }
        surfaceMesh = new THREE.Mesh(geometry, material);
        surfaceMesh.userData.surface = true;
        scene.add(surfaceMesh);

        if (wireMesh) {
          scene.remove(wireMesh);
          wireMesh.geometry.dispose();
          wireMesh.material.dispose();
        }
        wireMesh = new THREE.LineSegments(
          new THREE.WireframeGeometry(geometry),
          new THREE.LineBasicMaterial({ color: 0x100f0c, transparent: true, opacity: 0.12 })
        );
        scene.add(wireMesh);
      }

      function nearestGridId(point) {
        const i = clamp(Math.round((point.x + surfaceSize / 2) / spacing), 0, grid - 1);
        const j = clamp(Math.round((point.z + surfaceSize / 2) / spacing), 0, grid - 1);
        return index(i, j);
      }

      function edgeWeight(a, b) {
        const pa = vertices[a];
        const pb = vertices[b];
        return pa.distanceTo(pb);
      }

      function heuristic(a, b) {
        return vertices[a].distanceTo(vertices[b]);
      }

      function shortestPath(start, goal) {
        const open = [start];
        const inOpen = new Uint8Array(nodeCount);
        const closed = new Uint8Array(nodeCount);
        const cameFrom = new Int32Array(nodeCount);
        const g = new Float64Array(nodeCount);
        const f = new Float64Array(nodeCount);
        cameFrom.fill(-1);
        g.fill(Infinity);
        f.fill(Infinity);
        g[start] = 0;
        f[start] = heuristic(start, goal);
        inOpen[start] = 1;

        while (open.length) {
          let bestIndex = 0;
          let bestScore = f[open[0]];
          for (let i = 1; i < open.length; i += 1) {
            const score = f[open[i]];
            if (score < bestScore) {
              bestScore = score;
              bestIndex = i;
            }
          }

          const current = open.splice(bestIndex, 1)[0];
          inOpen[current] = 0;
          if (current === goal) break;
          closed[current] = 1;
          const cx = current % grid;
          const cy = Math.floor(current / grid);

          for (let oy = -1; oy <= 1; oy += 1) {
            for (let ox = -1; ox <= 1; ox += 1) {
              if (!ox && !oy) continue;
              const nx = cx + ox;
              const ny = cy + oy;
              if (nx < 0 || nx >= grid || ny < 0 || ny >= grid) continue;
              const next = index(nx, ny);
              if (closed[next]) continue;
              const tentative = g[current] + edgeWeight(current, next);
              if (tentative >= g[next]) continue;
              cameFrom[next] = current;
              g[next] = tentative;
              f[next] = tentative + heuristic(next, goal);
              if (!inOpen[next]) {
                open.push(next);
                inOpen[next] = 1;
              }
            }
          }
        }

        const path = [];
        let current = goal;
        while (current !== -1) {
          path.push(current);
          if (current === start) break;
          current = cameFrom[current];
        }
        return path.reverse();
      }

      function pathDistance(points) {
        let total = 0;
        for (let i = 1; i < points.length; i += 1) total += points[i - 1].distanceTo(points[i]);
        return total;
      }

      function disposeObject(object) {
        if (!object) return;
        scene.remove(object);
        object.traverse((child) => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach((material) => material.dispose());
            else child.material.dispose();
          }
        });
      }

      function tube(points, color, radius, opacity = 1) {
        const curve = points.length === 2
          ? new THREE.LineCurve3(points[0], points[1])
          : new THREE.CatmullRomCurve3(points, false, "centripetal", 0.35);
        const geometry = new THREE.TubeGeometry(curve, Math.max(20, points.length * 2), radius, 8, false);
        const material = new THREE.MeshStandardMaterial({
          color,
          emissive: color,
          emissiveIntensity: 0.24,
          roughness: 0.45,
          transparent: opacity < 1,
          opacity
        });
        return new THREE.Mesh(geometry, material);
      }

      function marker(point, color, label) {
        const group = new THREE.Group();
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.16, 24, 16),
          new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.2, roughness: 0.35 })
        );
        sphere.position.copy(point).addScaledVector(up, 0.22);
        group.add(sphere);

        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(0.28, 0.018, 8, 48),
          new THREE.MeshBasicMaterial({ color: 0x100f0c })
        );
        ring.rotation.x = Math.PI / 2;
        ring.position.copy(point).addScaledVector(up, 0.08);
        group.add(ring);
        group.userData.label = label;
        return group;
      }

      function updateMarkers() {
        markers.forEach((item) => disposeObject(item));
        markers.length = 0;
        selected.forEach((id, index) => {
          const item = marker(pointForIndex(id), index ? 0xff4f35 : 0xbaff39, index ? "B" : "A");
          markers.push(item);
          scene.add(item);
        });
      }

      function computeAndDraw() {
        disposeObject(pathObject);
        disposeObject(chordObject);
        pathObject = undefined;
        chordObject = undefined;
        pathPoints = [];

        updateMarkers();
        if (selected.length < 2) {
          statusLabel.textContent = selected.length ? "select end point" : "select two points";
          surfaceLengthLabel.textContent = "0.00";
          chordLengthLabel.textContent = "0.00";
          extraLengthLabel.textContent = "0%";
          return;
        }

        const nodePath = shortestPath(selected[0], selected[1]);
        pathPoints = nodePath.map((id) => pointForIndex(id).addScaledVector(up, 0.12));
        pathLength = pathDistance(pathPoints);
        chordLength = vertices[selected[0]].distanceTo(vertices[selected[1]]);
        const extra = Math.max(0, (pathLength / Math.max(chordLength, 0.001) - 1) * 100);
        const chordPoints = [
          pointForIndex(selected[0]).addScaledVector(up, 0.22),
          pointForIndex(selected[1]).addScaledVector(up, 0.22)
        ];

        chordObject = tube(chordPoints, 0xff4f35, 0.035, 0.62);
        pathObject = tube(pathPoints, 0xbaff39, 0.065, 1);
        scene.add(chordObject, pathObject);
        reveal = 0;
        statusLabel.textContent = `computed ${nodePath.length} mesh nodes`;
        surfaceLengthLabel.textContent = pathLength.toFixed(2);
        chordLengthLabel.textContent = chordLength.toFixed(2);
        extraLengthLabel.textContent = `${extra.toFixed(0)}%`;
      }

      function placeDefaultPath() {
        selected.length = 0;
        selected.push(index(18, 44), index(70, 44));
        computeAndDraw();
      }

      function clickSurface(event) {
        const rect = canvas.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hit = raycaster.intersectObject(surfaceMesh, false)[0];
        if (!hit) return;
        if (selected.length === 2) selected.length = 0;
        selected.push(nearestGridId(hit.point));
        computeAndDraw();
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        renderer.setPixelRatio(dpr);
        renderer.setSize(rect.width, rect.height, false);
        camera.aspect = rect.width / Math.max(rect.height, 1);
        camera.updateProjectionMatrix();
      }

      function updateCamera() {
        const radius = 15.6;
        camera.position.set(
          Math.sin(yaw) * radius,
          6 + Math.sin(tilt) * 3.8,
          Math.cos(yaw) * radius
        );
        camera.lookAt(0, 1, 0);
      }

      function animate(now = 0) {
        const dt = Math.min(0.05, (now - last) / 1000 || 0.016);
        last = now;
        yaw += (targetYaw - yaw) * 0.05;
        tilt += (targetTilt - tilt) * 0.05;
        updateCamera();

        if (pathObject) {
          reveal = Math.min(1, reveal + dt * 0.9);
          pathObject.material.emissiveIntensity = 0.22 + Math.sin(now * 0.004) * 0.08;
        }
        if (traveler && pathPoints.length) {
          const t = (now * 0.00008) % 1;
          const id = Math.min(pathPoints.length - 1, Math.floor(t * (pathPoints.length - 1)));
          traveler.position.copy(pathPoints[id]).addScaledVector(up, 0.2);
        }
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      function addTraveler() {
        traveler = new THREE.Mesh(
          new THREE.SphereGeometry(0.12, 18, 12),
          new THREE.MeshStandardMaterial({ color: 0x100f0c, emissive: 0xbaff39, emissiveIntensity: 0.35 })
        );
        scene.add(traveler);
      }

      function reset() {
        selected.length = 0;
        placeDefaultPath();
      }

      function newSurface() {
        terrainSeed += 2.37;
        disposeObject(pathObject);
        disposeObject(chordObject);
        markers.forEach((item) => disposeObject(item));
        selected.length = 0;
        makeSurface();
        placeDefaultPath();
      }

      canvas.addEventListener("click", clickSurface);
      canvas.addEventListener("pointermove", (event) => {
        const x = event.clientX / Math.max(window.innerWidth, 1) - 0.5;
        const y = event.clientY / Math.max(window.innerHeight, 1) - 0.5;
        targetYaw = -0.52 + x * 0.48;
        targetTilt = 0.78 + y * 0.18;
      }, { passive: true });
      window.addEventListener("resize", resize);
      resetButton.addEventListener("click", reset);
      newSurfaceButton.addEventListener("click", newSurface);

      makeSurface();
      addTraveler();
      placeDefaultPath();
      resize();
      updateCamera();
      requestAnimationFrame(animate);
    </script>
