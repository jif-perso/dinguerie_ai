<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="dinguerie is an immersive hyperbolic space.">
    <meta name="theme-color" content="#f3eee4">
    <meta property="og:title" content="dinguerie">
    <meta property="og:description" content="An immersive hyperbolic space.">
    <meta property="og:type" content="website">
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23100f0c'/%3E%3Ccircle cx='32' cy='32' r='24' fill='none' stroke='%23f3eee4' stroke-width='4'/%3E%3Cpath d='M12 34C22 15 42 49 52 30' fill='none' stroke='%23baff39' stroke-width='5' stroke-linecap='square'/%3E%3C/svg%3E"
    >
    <title>dinguerie</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f3eee4;
        --paper-hot: #fffaf0;
        --ink: #100f0c;
        --soft: #6e665c;
        --line: rgba(16, 15, 12, 0.18);
        --line-strong: rgba(16, 15, 12, 0.44);
        --blue: #2454ff;
        --red: #ff4f35;
        --green: #baff39;
        --mint: #38d0aa;
        --gold: #d4a321;
        --violet: #7e69ff;
        --mono: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", monospace;
        --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --serif: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      a {
        color: inherit;
        font: inherit;
      }

      ::selection {
        background: var(--ink);
        color: var(--paper);
      }

      :focus-visible {
        outline: 3px solid var(--green);
        outline-offset: 4px;
      }

      .space {
        position: fixed;
        inset: 0;
        isolation: isolate;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(16, 15, 12, 0.035) 1px, transparent 1px),
          linear-gradient(0deg, rgba(16, 15, 12, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 50% 52%, var(--paper-hot), var(--paper) 56%, #d7ccbd 100%);
        background-size: 34px 34px, 34px 34px, 100% 100%;
      }

      .stage {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        cursor: crosshair;
        touch-action: none;
      }

      .stage path,
      .stage circle,
      .stage text,
      .stage line {
        vector-effect: non-scaling-stroke;
      }

      .disk {
        fill: rgba(255, 250, 240, 0.34);
        stroke: rgba(16, 15, 12, 0.88);
        stroke-width: 2.6;
      }

      .echo {
        fill: none;
        stroke: rgba(16, 15, 12, 0.12);
        stroke-width: 1.15;
      }

      .tile {
        stroke: rgba(16, 15, 12, 0.12);
        stroke-width: 0.72;
      }

      .mesh {
        fill: none;
        stroke: rgba(16, 15, 12, 0.23);
        stroke-width: 1.05;
      }

      .mesh-hot {
        stroke: rgba(36, 84, 255, 0.55);
        stroke-width: 1.35;
      }

      .triangle-fill {
        fill: rgba(186, 255, 57, 0.23);
        stroke: none;
      }

      .triangle-edge {
        fill: none;
        stroke: var(--ink);
        stroke-linecap: square;
        stroke-linejoin: round;
        stroke-width: 2.6;
      }

      .triangle-edge-blue {
        stroke: var(--blue);
      }

      .triangle-edge-red {
        stroke: var(--red);
      }

      .observer {
        fill: var(--green);
        stroke: var(--ink);
        stroke-width: 2.2;
      }

      .observer-ring {
        fill: none;
        stroke: var(--ink);
        stroke-dasharray: 4 7;
        stroke-width: 1.3;
      }

      .label {
        fill: var(--ink);
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 900;
        paint-order: stroke;
        stroke: var(--paper);
        stroke-width: 5px;
        text-transform: uppercase;
      }

      .horizon-label {
        fill: rgba(16, 15, 12, 0.54);
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .wordmark {
        fill: rgba(16, 15, 12, 0.075);
        font-family: var(--serif);
        font-size: 120px;
        font-weight: 500;
      }

      .chrome {
        position: fixed;
        inset: 0 0 auto;
        z-index: 4;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 1rem;
        align-items: center;
        padding: 1rem 1.25rem;
        pointer-events: none;
      }

      .brand,
      .formula,
      .readout {
        pointer-events: auto;
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 850;
      }

      .brand {
        justify-self: start;
        text-decoration: none;
      }

      .brand::before {
        display: inline-block;
        width: 0.72rem;
        height: 0.72rem;
        margin-right: 0.62rem;
        background: var(--green);
        box-shadow: inset 0 0 0 2px var(--ink);
        content: "";
        vertical-align: -0.08rem;
      }

      .formula {
        justify-self: center;
        min-width: 26rem;
        padding: 0.55rem 0.78rem;
        border: 1px solid var(--line);
        background: rgba(243, 238, 228, 0.9);
        text-align: center;
      }

      .readout {
        justify-self: end;
        color: var(--soft);
        text-align: right;
        text-transform: uppercase;
      }

      .caption {
        position: fixed;
        left: 50%;
        bottom: 1.05rem;
        z-index: 4;
        display: grid;
        gap: 0.34rem;
        width: min(48rem, calc(100vw - 2rem));
        translate: -50% 0;
        color: rgba(16, 15, 12, 0.72);
        font-family: var(--mono);
        font-size: 0.66rem;
        font-weight: 850;
        line-height: 1.35;
        text-align: center;
        text-transform: uppercase;
        pointer-events: none;
      }

      .caption strong {
        color: var(--ink);
      }

      @media (max-width: 820px) {
        .chrome {
          grid-template-columns: 1fr auto;
          padding: 0.85rem;
        }

        .formula {
          display: none;
        }

        .caption {
          bottom: 0.85rem;
          width: calc(100vw - 1.7rem);
          font-size: 0.6rem;
        }

        .readout {
          font-size: 0.66rem;
        }
      }

      @media (max-width: 560px) {
        .stage {
          top: 12vh;
          left: -10vw;
          width: 120vw;
          height: 62vh;
          bottom: auto;
        }

        .readout {
          display: none;
        }

        .caption {
          right: 0.85rem;
          left: 0.85rem;
          width: min(22rem, 88vw);
          translate: 0;
          text-align: left;
          overflow-wrap: anywhere;
        }
      }
    </style>
  </head>
  <body>
    <main class="space" id="top" aria-label="dinguerie hyperbolic space">
      <svg class="stage" id="stage" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Hyperbolic cathedral">
        <defs>
          <clipPath id="diskClip">
            <circle cx="600" cy="455" r="398"></circle>
          </clipPath>
        </defs>
        <circle class="echo" cx="600" cy="455" r="456"></circle>
        <circle class="echo" cx="600" cy="455" r="428"></circle>
        <circle class="disk" cx="600" cy="455" r="398"></circle>
        <g clip-path="url(#diskClip)">
          <g id="tiles"></g>
          <g id="mesh"></g>
          <text class="wordmark" x="600" y="492" text-anchor="middle">dinguerie</text>
          <g id="triangleFill"></g>
          <g id="triangleEdges"></g>
        </g>
        <circle class="disk" cx="600" cy="455" r="398" fill="none"></circle>
        <g id="observerLayer"></g>
        <text class="horizon-label" x="600" y="68" text-anchor="middle">the rim is not a wall, it is infinity</text>
      </svg>

      <header class="chrome">
        <a class="brand" href="#top">dinguerie</a>
        <div class="formula">equal rooms shrink toward the edge because distance is exploding</div>
        <div class="readout" id="readout">depth 0.00 / angle sum 61 deg</div>
      </header>

      <p class="caption">
        <strong>Move to walk.</strong>
        Equal rooms shrink toward infinity. The bright triangle proves the geometry changed: its angles add to less than 180 deg.
      </p>
    </main>

    <script>
      (() => {
        const NS = "http://www.w3.org/2000/svg";
        const CENTER = { x: 600, y: 455 };
        const RADIUS = 398;
        const TAU = Math.PI * 2;
        const stage = document.querySelector("#stage");
        const tilesGroup = document.querySelector("#tiles");
        const meshGroup = document.querySelector("#mesh");
        const triangleFill = document.querySelector("#triangleFill");
        const triangleEdges = document.querySelector("#triangleEdges");
        const observerLayer = document.querySelector("#observerLayer");
        const readout = document.querySelector("#readout");
        const palette = ["#2454ff", "#ff4f35", "#38d0aa", "#d4a321", "#7e69ff", "#baff39"];
        const radialCount = 36;
        const ringDepths = [0, 0.42, 0.82, 1.22, 1.66, 2.14, 2.7, 3.36, 4.18, 5.24, 6.6];
        const triangleWorld = [
          { re: -0.72, im: 0.42 },
          { re: 0.66, im: 0.48 },
          { re: 0.2, im: -0.55 }
        ];
        let observer = { re: 0.18, im: -0.08 };
        let scheduled = false;

        function createSvg(name, attrs = {}) {
          const element = document.createElementNS(NS, name);
          Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
          return element;
        }

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function abs2(z) {
          return z.re * z.re + z.im * z.im;
        }

        function sub(a, b) {
          return { re: a.re - b.re, im: a.im - b.im };
        }

        function mul(a, b) {
          return {
            re: a.re * b.re - a.im * b.im,
            im: a.re * b.im + a.im * b.re
          };
        }

        function div(a, b) {
          const denominator = abs2(b) || 1e-9;
          return {
            re: (a.re * b.re + a.im * b.im) / denominator,
            im: (a.im * b.re - a.re * b.im) / denominator
          };
        }

        function atanh(value) {
          const x = clamp(value, -0.999999, 0.999999);
          return 0.5 * Math.log((1 + x) / (1 - x));
        }

        function radiusAt(depth) {
          return Math.tanh(depth / 2);
        }

        function polar(radius, angle) {
          return { re: Math.cos(angle) * radius, im: Math.sin(angle) * radius };
        }

        function transport(z) {
          const conjugate = { re: observer.re, im: -observer.im };
          return div(sub(z, observer), sub({ re: 1, im: 0 }, mul(conjugate, z)));
        }

        function toScreen(z) {
          return {
            x: CENTER.x + z.re * RADIUS,
            y: CENTER.y - z.im * RADIUS
          };
        }

        function pathFrom(points, close = false) {
          if (!points.length) return "";
          const d = points
            .map((point, index) => `${index ? "L" : "M"}${point.x.toFixed(2)} ${point.y.toFixed(2)}`)
            .join(" ");
          return close ? `${d}Z` : d;
        }

        function screenPath(points, close = false) {
          return pathFrom(points.map((point) => toScreen(transport(point))), close);
        }

        function geodesicSamples(a, b, count = 44) {
          const determinant = a.re * b.im - a.im * b.re;
          if (Math.abs(determinant) < 1e-5) {
            const points = [];
            for (let i = 0; i <= count; i += 1) {
              const t = i / count;
              points.push({
                re: a.re + (b.re - a.re) * t,
                im: a.im + (b.im - a.im) * t
              });
            }
            return points;
          }

          const rhsA = (abs2(a) + 1) / 2;
          const rhsB = (abs2(b) + 1) / 2;
          const center = {
            re: (rhsA * b.im - a.im * rhsB) / determinant,
            im: (a.re * rhsB - rhsA * b.re) / determinant
          };
          const circleRadius = Math.sqrt(Math.max(abs2(center) - 1, 0));
          const start = Math.atan2(a.im - center.im, a.re - center.re);
          const end = Math.atan2(b.im - center.im, b.re - center.re);
          let delta = ((end - start + Math.PI) % TAU + TAU) % TAU - Math.PI;
          const middle = {
            re: center.re + Math.cos(start + delta / 2) * circleRadius,
            im: center.im + Math.sin(start + delta / 2) * circleRadius
          };
          if (abs2(middle) > 1.0001) delta += delta > 0 ? -TAU : TAU;

          const points = [];
          for (let i = 0; i <= count; i += 1) {
            const angle = start + delta * i / count;
            points.push({
              re: center.re + Math.cos(angle) * circleRadius,
              im: center.im + Math.sin(angle) * circleRadius
            });
          }
          return points;
        }

        function hyperbolicDistance(a, b) {
          const denominator = Math.max((1 - abs2(a)) * (1 - abs2(b)), 1e-9);
          const value = 1 + 2 * abs2(sub(a, b)) / denominator;
          return Math.acosh(Math.max(1, value));
        }

        function hyperbolicAngles(points) {
          const sideA = hyperbolicDistance(points[1], points[2]);
          const sideB = hyperbolicDistance(points[0], points[2]);
          const sideC = hyperbolicDistance(points[0], points[1]);
          const angle = (opposite, adjacentA, adjacentB) => {
            const denominator = Math.sinh(adjacentA) * Math.sinh(adjacentB);
            const value = (Math.cosh(adjacentA) * Math.cosh(adjacentB) - Math.cosh(opposite)) / denominator;
            return Math.acos(clamp(value, -1, 1));
          };
          return [
            angle(sideA, sideB, sideC),
            angle(sideB, sideA, sideC),
            angle(sideC, sideA, sideB)
          ];
        }

        function triangleAngleSum() {
          return hyperbolicAngles(triangleWorld).reduce((total, angle) => total + angle, 0) * 180 / Math.PI;
        }

        function tilePath(innerDepth, outerDepth, startAngle, endAngle) {
          const innerRadius = radiusAt(innerDepth);
          const outerRadius = radiusAt(outerDepth);
          const steps = 3;
          const points = [];
          for (let i = 0; i <= steps; i += 1) {
            points.push(polar(outerRadius, startAngle + (endAngle - startAngle) * i / steps));
          }
          for (let i = steps; i >= 0; i -= 1) {
            points.push(polar(innerRadius, startAngle + (endAngle - startAngle) * i / steps));
          }
          return screenPath(points, true);
        }

        function renderTiles() {
          const fragment = document.createDocumentFragment();
          for (let ring = 0; ring < ringDepths.length - 1; ring += 1) {
            const inner = ringDepths[ring];
            const outer = ringDepths[ring + 1];
            const offset = ring % 2 ? Math.PI / radialCount : 0;
            for (let segment = 0; segment < radialCount; segment += 1) {
              const start = offset + segment * TAU / radialCount;
              const end = offset + (segment + 1) * TAU / radialCount;
              const color = palette[(ring + segment) % palette.length];
              const opacity = ring < 3 ? 0.18 : 0.1;
              fragment.append(createSvg("path", {
                class: "tile",
                d: tilePath(inner, outer, start, end),
                fill: color,
                "fill-opacity": opacity.toFixed(2)
              }));
            }
          }
          tilesGroup.replaceChildren(fragment);
        }

        function renderMesh() {
          const fragment = document.createDocumentFragment();
          for (let ring = 1; ring < ringDepths.length; ring += 1) {
            const radius = radiusAt(ringDepths[ring]);
            const points = [];
            const count = 100;
            for (let i = 0; i <= count; i += 1) points.push(polar(radius, i * TAU / count));
            fragment.append(createSvg("path", {
              class: ring === 5 ? "mesh mesh-hot" : "mesh",
              d: screenPath(points)
            }));
          }

          for (let i = 0; i < radialCount; i += 1) {
            if (i % 2 && i % 3) continue;
            const angle = i * TAU / radialCount;
            const points = ringDepths.map((depth) => polar(radiusAt(depth), angle));
            fragment.append(createSvg("path", {
              class: i % 6 === 0 ? "mesh mesh-hot" : "mesh",
              d: screenPath(points)
            }));
          }
          meshGroup.replaceChildren(fragment);
        }

        function renderTriangle() {
          const sides = [
            geodesicSamples(triangleWorld[0], triangleWorld[1], 46),
            geodesicSamples(triangleWorld[1], triangleWorld[2], 46),
            geodesicSamples(triangleWorld[2], triangleWorld[0], 46)
          ];
          const skin = sides[0].concat(sides[1].slice(1), sides[2].slice(1));
          triangleFill.replaceChildren(createSvg("path", {
            class: "triangle-fill",
            d: screenPath(skin, true)
          }));
          triangleEdges.replaceChildren(
            createSvg("path", { class: "triangle-edge triangle-edge-blue", d: screenPath(sides[0]) }),
            createSvg("path", { class: "triangle-edge triangle-edge-red", d: screenPath(sides[1]) }),
            createSvg("path", { class: "triangle-edge", d: screenPath(sides[2]) })
          );
        }

        function renderObserver() {
          observerLayer.replaceChildren(
            createSvg("circle", {
              class: "observer-ring",
              cx: CENTER.x,
              cy: CENTER.y,
              r: 28
            }),
            createSvg("circle", {
              class: "observer",
              cx: CENTER.x,
              cy: CENTER.y,
              r: 9
            }),
            createSvg("text", {
              class: "label",
              x: CENTER.x + 18,
              y: CENTER.y - 16
            })
          );
          observerLayer.lastChild.textContent = "you";

          const trianglePoint = toScreen(transport(triangleWorld[0]));
          observerLayer.append(createSvg("text", {
            class: "label",
            x: trianglePoint.x + 12,
            y: trianglePoint.y - 12
          }));
          observerLayer.lastChild.textContent = `angle sum ${triangleAngleSum().toFixed(0)} deg`;
        }

        function updateReadout() {
          const depth = 2 * atanh(Math.hypot(observer.re, observer.im));
          const angleSum = triangleAngleSum();
          readout.textContent = `depth ${depth.toFixed(2)} / angle sum ${angleSum.toFixed(0)} deg`;
        }

        function render() {
          renderTiles();
          renderMesh();
          renderTriangle();
          renderObserver();
          updateReadout();
          scheduled = false;
        }

        function scheduleRender() {
          if (scheduled) return;
          scheduled = true;
          requestAnimationFrame(render);
        }

        function pointFromEvent(event) {
          const matrix = stage.getScreenCTM();
          if (!matrix) return observer;
          const point = stage.createSVGPoint();
          point.x = event.clientX;
          point.y = event.clientY;
          const local = point.matrixTransform(matrix.inverse());
          const raw = {
            re: (local.x - CENTER.x) / RADIUS,
            im: (CENTER.y - local.y) / RADIUS
          };
          const magnitude = Math.hypot(raw.re, raw.im);
          if (magnitude > 0.82) {
            return {
              re: raw.re / magnitude * 0.82,
              im: raw.im / magnitude * 0.82
            };
          }
          return raw;
        }

        stage.addEventListener("pointermove", (event) => {
          observer = pointFromEvent(event);
          scheduleRender();
        }, { passive: true });

        stage.addEventListener("pointerdown", (event) => {
          observer = pointFromEvent(event);
          scheduleRender();
        }, { passive: true });

        window.addEventListener("resize", scheduleRender);
        render();
      })();
    </script>
  </body>
</html>
