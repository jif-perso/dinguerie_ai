<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="dinguerie is a living typographic sculpture.">
    <meta name="theme-color" content="#f4efe6">
    <meta property="og:title" content="dinguerie">
    <meta property="og:description" content="A living typographic sculpture.">
    <meta property="og:type" content="website">
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2311110f'/%3E%3Cpath d='M12 34c10-20 30-20 40 0' fill='none' stroke='%23f4efe6' stroke-width='5' stroke-linecap='square'/%3E%3Ccircle cx='23' cy='38' r='4' fill='%23c8ff45'/%3E%3Ccircle cx='41' cy='38' r='4' fill='%23ff5338'/%3E%3C/svg%3E"
    >
    <title>dinguerie</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f4efe6;
        --paper-hot: #fffaf1;
        --ink: #11110f;
        --muted: #756d62;
        --line: rgba(17, 17, 15, 0.18);
        --line-strong: rgba(17, 17, 15, 0.4);
        --lime: #c8ff45;
        --blue: #315cff;
        --coral: #ff5338;
        --mint: #39d8a4;
        --violet: #816bff;
        --gold: #d9a31f;
        --active: var(--blue);
        --mono: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", monospace;
        --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      button,
      input,
      a {
        font: inherit;
      }

      button,
      input {
        color: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      ::selection {
        background: var(--ink);
        color: var(--paper);
      }

      :focus-visible {
        outline: 3px solid var(--active);
        outline-offset: 4px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .world {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }

      .grain {
        position: fixed;
        inset: 0;
        z-index: 1;
        opacity: 0.34;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(17, 17, 15, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(17, 17, 15, 0.06) 1px, transparent 1px);
        background-size: 10px 10px;
        mask-image: radial-gradient(circle at 50% 42%, black 0%, black 34%, transparent 78%);
      }

      .vignette {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(244, 239, 230, 0.78), transparent 17%, transparent 78%, rgba(244, 239, 230, 0.9)),
          radial-gradient(circle at 50% 44%, transparent 0%, transparent 52%, rgba(17, 17, 15, 0.11) 100%);
      }

      .chrome {
        position: fixed;
        inset: 0 0 auto;
        z-index: 5;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.4rem;
        pointer-events: none;
      }

      .brand,
      .readout,
      .seed {
        pointer-events: auto;
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .brand {
        justify-self: start;
        color: var(--ink);
        text-decoration: none;
        text-transform: none;
      }

      .brand::before {
        display: inline-block;
        width: 0.72rem;
        height: 0.72rem;
        margin-right: 0.62rem;
        background: var(--active);
        box-shadow: inset 0 0 0 2px var(--ink);
        content: "";
        vertical-align: -0.08rem;
      }

      .readout {
        justify-self: center;
        min-width: 10rem;
        padding: 0.5rem 0.72rem;
        border: 1px solid var(--line);
        background: rgba(244, 239, 230, 0.74);
        backdrop-filter: blur(16px);
        color: var(--ink);
        text-align: center;
      }

      .seed {
        justify-self: end;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--muted);
      }

      .seed input {
        width: 5.2rem;
        border: 0;
        border-bottom: 1px solid var(--line-strong);
        border-radius: 0;
        outline: 0;
        background: transparent;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 850;
        text-align: right;
      }

      .annotations {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }

      .note {
        position: absolute;
        max-width: 13rem;
        padding-top: 0.55rem;
        border-top: 1px solid var(--line-strong);
        color: rgba(17, 17, 15, 0.7);
        font-family: var(--mono);
        font-size: 0.66rem;
        font-weight: 820;
        line-height: 1.35;
        text-transform: uppercase;
      }

      .note::before {
        position: absolute;
        top: -0.34rem;
        left: 0;
        width: 0.62rem;
        height: 0.62rem;
        background: var(--active);
        box-shadow: inset 0 0 0 1px var(--ink);
        content: "";
      }

      .note-a {
        top: 22%;
        left: 6%;
      }

      .note-b {
        top: 18%;
        right: 10%;
      }

      .note-c {
        right: 7%;
        bottom: 22%;
      }

      .instruments {
        position: fixed;
        inset: auto 1.4rem 1.2rem;
        z-index: 6;
        display: grid;
        grid-template-columns: minmax(14rem, 23rem) auto;
        gap: 1rem;
        align-items: end;
        pointer-events: none;
      }

      .meters {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        border: 1px solid var(--line);
        background: var(--line);
        box-shadow: 10px 10px 0 rgba(17, 17, 15, 0.08);
        pointer-events: auto;
      }

      .meter {
        min-height: 5.5rem;
        padding: 0.78rem;
        background: rgba(244, 239, 230, 0.82);
        backdrop-filter: blur(18px);
      }

      .meter span {
        display: block;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 0.62rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .meter strong {
        display: block;
        margin-top: 0.86rem;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 1rem;
        font-weight: 850;
      }

      .dock {
        justify-self: end;
        display: grid;
        grid-template-columns: repeat(4, 3rem);
        gap: 0.42rem;
        padding: 0.42rem;
        border: 1px solid var(--line);
        background: rgba(244, 239, 230, 0.82);
        backdrop-filter: blur(18px);
        box-shadow: 10px 10px 0 rgba(17, 17, 15, 0.08);
        pointer-events: auto;
      }

      .tool {
        display: grid;
        width: 3rem;
        height: 3rem;
        place-items: center;
        border: 1px solid transparent;
        background: transparent;
        transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
      }

      .tool:hover {
        border-color: var(--line-strong);
        background: var(--paper-hot);
      }

      .tool:active {
        transform: translateY(2px);
      }

      .tool-primary {
        border-color: var(--ink);
        background: var(--active);
      }

      .icon {
        position: relative;
        display: block;
        width: 1.35rem;
        height: 1.35rem;
      }

      .icon::before,
      .icon::after {
        position: absolute;
        content: "";
      }

      .icon-spark {
        border: 2px solid var(--ink);
        rotate: 45deg;
      }

      .icon-spark::before {
        inset: 0.24rem;
        border: 2px solid var(--ink);
      }

      .icon-pause {
        border-left: 4px solid var(--ink);
        border-right: 4px solid var(--ink);
      }

      .icon-clear {
        border-top: 2px solid var(--ink);
        border-bottom: 2px solid var(--ink);
        rotate: -18deg;
      }

      .icon-clear::before {
        inset: 0.42rem -0.2rem;
        border-top: 2px solid var(--ink);
        rotate: 46deg;
      }

      .icon-print {
        border: 2px solid var(--ink);
      }

      .icon-print::before {
        left: 0.22rem;
        right: 0.22rem;
        bottom: -0.36rem;
        height: 0.46rem;
        border: 2px solid var(--ink);
        background: var(--paper);
      }

      .caption {
        position: fixed;
        left: 50%;
        bottom: 1.85rem;
        z-index: 4;
        translate: -50% 0;
        width: min(34rem, calc(100vw - 2rem));
        color: rgba(17, 17, 15, 0.72);
        font-family: var(--mono);
        font-size: 0.66rem;
        font-weight: 820;
        line-height: 1.35;
        text-align: center;
        text-transform: uppercase;
        pointer-events: none;
      }

      @media (max-width: 860px) {
        .chrome {
          grid-template-columns: 1fr auto;
        }

        .readout {
          display: none;
        }

        .note {
          display: none;
        }

        .instruments {
          grid-template-columns: 1fr;
        }

        .dock {
          justify-self: stretch;
          grid-template-columns: repeat(4, 1fr);
        }

        .tool {
          width: auto;
        }

        .caption {
          display: none;
        }
      }

      @media (max-width: 560px) {
        .chrome {
          padding: 0.85rem;
        }

        .seed span {
          display: none;
        }

        .instruments {
          inset: auto 0.85rem 0.85rem;
        }

        .meter {
          min-height: 4.1rem;
          padding: 0.62rem;
        }

        .meter strong {
          margin-top: 0.55rem;
          font-size: 0.9rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <canvas class="world" id="world" aria-hidden="true"></canvas>
    <div class="grain" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <header class="chrome">
      <a class="brand" href="#top">dinguerie</a>
      <div class="readout" id="readout">forming</div>
      <label class="seed">
        <span>seed</span>
        <input id="seed" value="02491" aria-label="Seed">
      </label>
    </header>

    <main id="top" aria-label="dinguerie">
      <h1 class="sr-only">dinguerie</h1>

      <div class="annotations" aria-hidden="true">
        <p class="note note-a" id="note-a">soft riot held in a serif skeleton</p>
        <p class="note note-b" id="note-b">weather behaves when nobody asks</p>
        <p class="note note-c" id="note-c">the word keeps remembering itself</p>
      </div>

      <p class="caption" id="caption">a word that refuses to stay printed</p>

      <section class="instruments" aria-label="Controls">
        <div class="meters" aria-live="polite">
          <div class="meter">
            <span>pressure</span>
            <strong id="pressure">0.34</strong>
          </div>
          <div class="meter">
            <span>particles</span>
            <strong id="count">0</strong>
          </div>
          <div class="meter">
            <span>state</span>
            <strong id="state">awake</strong>
          </div>
        </div>

        <nav class="dock" aria-label="Actions">
          <button class="tool tool-primary" type="button" id="spark" aria-label="Spark" title="Spark">
            <span class="icon icon-spark" aria-hidden="true"></span>
          </button>
          <button class="tool" type="button" id="pause" aria-label="Pause" title="Pause">
            <span class="icon icon-pause" aria-hidden="true"></span>
          </button>
          <button class="tool" type="button" id="clear" aria-label="Clear" title="Clear">
            <span class="icon icon-clear" aria-hidden="true"></span>
          </button>
          <button class="tool" type="button" id="print" aria-label="Print" title="Print">
            <span class="icon icon-print" aria-hidden="true"></span>
          </button>
        </nav>
      </section>
    </main>

    <script>
      (() => {
        const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
        const root = document.documentElement;
        const canvas = document.querySelector("#world");
        const ctx = canvas.getContext("2d", { alpha: false });
        const seedInput = document.querySelector("#seed");
        const readout = document.querySelector("#readout");
        const pressureLabel = document.querySelector("#pressure");
        const countLabel = document.querySelector("#count");
        const stateLabel = document.querySelector("#state");
        const caption = document.querySelector("#caption");
        const notes = [
          document.querySelector("#note-a"),
          document.querySelector("#note-b"),
          document.querySelector("#note-c")
        ];
        const sparkButton = document.querySelector("#spark");
        const pauseButton = document.querySelector("#pause");
        const clearButton = document.querySelector("#clear");
        const printButton = document.querySelector("#print");

        const colors = ["#11110f", "#315cff", "#ff5338", "#c8ff45", "#39d8a4", "#816bff", "#d9a31f"];
        const captions = [
          "a word that refuses to stay printed",
          "a small weather system with a name",
          "letters trying to become architecture",
          "a poster that learned to breathe",
          "soft noise arranged into a little ceremony"
        ];
        const noteBank = [
          "soft riot held in a serif skeleton",
          "weather behaves when nobody asks",
          "the word keeps remembering itself",
          "pressure makes the alphabet liquid",
          "a quiet machine made of dust",
          "geometry admits it is alive for once",
          "the center is only a rumor",
          "ink without paper, paper without ink"
        ];

        let width = 1;
        let height = 1;
        let ratio = 1;
        let seed = 2491;
        let rand = mulberry(seed);
        let particles = [];
        let shards = [];
        let ripples = [];
        let frame = 0;
        let paused = false;
        let pressure = 0.34;
        let pointer = { x: 0, y: 0, active: false, down: false };
        let activeColor = 1;
        let printFlash = 0;

        function mulberry(value) {
          return function next() {
            value |= 0;
            value = value + 0x6D2B79F5 | 0;
            let t = Math.imul(value ^ value >>> 15, 1 | value);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
          };
        }

        function clamp(value, min, max) {
          return Math.min(max, Math.max(min, value));
        }

        function fontSizeForViewport() {
          if (width < 560) return 82;
          if (width < 860) return 104;
          if (width < 1180) return 150;
          return 210;
        }

        function sampleWord() {
          const offscreen = document.createElement("canvas");
          const scale = 0.42;
          offscreen.width = Math.floor(width * scale);
          offscreen.height = Math.floor(height * scale);
          const octx = offscreen.getContext("2d", { willReadFrequently: true });
          octx.fillStyle = "#000";
          octx.fillRect(0, 0, offscreen.width, offscreen.height);
          octx.fillStyle = "#fff";
          octx.textAlign = "center";
          octx.textBaseline = "middle";
          octx.font = `${Math.floor(fontSizeForViewport() * scale)}px Georgia, Times New Roman, serif`;
          octx.fillText("dinguerie", offscreen.width / 2, offscreen.height * 0.48);

          const image = octx.getImageData(0, 0, offscreen.width, offscreen.height).data;
          const targets = [];
          const step = width < 680 ? 2 : 3;
          for (let y = 0; y < offscreen.height; y += step) {
            for (let x = 0; x < offscreen.width; x += step) {
              const index = (y * offscreen.width + x) * 4;
              if (image[index] > 80 && rand() > 0.12) {
                targets.push({
                  x: x / scale + (rand() - 0.5) * 2,
                  y: y / scale + (rand() - 0.5) * 2
                });
              }
            }
          }
          return targets;
        }

        function rebuild(keepSeed = true) {
          if (!keepSeed) {
            seed = 10000 + Math.floor(Math.random() * 89999);
            seedInput.value = String(seed);
          }
          const parsed = Number(seedInput.value.replace(/\D/g, "").slice(0, 8));
          seed = parsed || 2491;
          seedInput.value = String(seed).padStart(5, "0");
          rand = mulberry(seed);
          const targets = sampleWord();
          const old = particles;
          particles = targets.map((target, index) => {
            const previous = old[index % Math.max(1, old.length)];
            const jitter = 18 + rand() * 48;
            return {
              x: previous ? previous.x : target.x + (rand() - 0.5) * jitter,
              y: previous ? previous.y : target.y + (rand() - 0.5) * jitter,
              tx: target.x,
              ty: target.y,
              vx: (rand() - 0.5) * 2,
              vy: (rand() - 0.5) * 2,
              size: 0.9 + rand() * 2.3,
              color: Math.floor(rand() * colors.length),
              delay: rand() * 120,
              phase: rand() * Math.PI * 2
            };
          });
          countLabel.textContent = String(particles.length);
          updateCopy();
        }

        function updateCopy() {
          const start = Math.floor(rand() * noteBank.length);
          notes.forEach((note, index) => {
            note.textContent = noteBank[(start + index * 2) % noteBank.length];
          });
          caption.textContent = captions[Math.floor(rand() * captions.length)];
          activeColor = 1 + Math.floor(rand() * (colors.length - 1));
          root.style.setProperty("--active", colors[activeColor]);
        }

        function resize() {
          ratio = Math.min(devicePixelRatio || 1, 1.7);
          width = innerWidth;
          height = innerHeight;
          canvas.width = Math.round(width * ratio);
          canvas.height = Math.round(height * ratio);
          ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
          rebuild(true);
        }

        function ignite(x = width / 2, y = height / 2, force = 1) {
          ripples.push({ x, y, life: 0, force });
          while (ripples.length > 10) ripples.shift();
          pressure = clamp(pressure + 0.38 * force, 0.2, 2.2);
          readout.textContent = "fracture";
          particles.forEach((particle) => {
            const dx = particle.x - x;
            const dy = particle.y - y;
            const distance = Math.hypot(dx, dy) || 1;
            const push = Math.max(0, 1 - distance / 520) * 22 * force;
            particle.vx += dx / distance * push;
            particle.vy += dy / distance * push;
          });
          for (let i = 0; i < 18; i += 1) {
            shards.push({
              x,
              y,
              vx: (rand() - 0.5) * 18 * force,
              vy: (rand() - 0.5) * 18 * force,
              life: 1,
              size: 12 + rand() * 48,
              spin: (rand() - 0.5) * 0.2,
              angle: rand() * Math.PI,
              color: colors[Math.floor(rand() * colors.length)]
            });
          }
        }

        function updateParticle(particle, time) {
          if (particle.delay > 0) {
            particle.delay -= 1;
            return;
          }

          const driftX = Math.cos(time * 0.001 + particle.phase) * pressure * 0.18;
          const driftY = Math.sin(time * 0.0013 + particle.phase) * pressure * 0.18;
          particle.vx += (particle.tx + driftX - particle.x) * 0.018;
          particle.vy += (particle.ty + driftY - particle.y) * 0.018;

          if (pointer.active) {
            const dx = particle.x - pointer.x;
            const dy = particle.y - pointer.y;
            const distance = Math.hypot(dx, dy) || 1;
            const reach = pointer.down ? 280 : 180;
            const strength = Math.max(0, 1 - distance / reach);
            const direction = pointer.down ? -1 : 1;
            particle.vx += dx / distance * strength * direction * 1.7;
            particle.vy += dy / distance * strength * direction * 1.7;
          }

          ripples.forEach((ripple) => {
            const dx = particle.x - ripple.x;
            const dy = particle.y - ripple.y;
            const distance = Math.hypot(dx, dy) || 1;
            const ring = ripple.life * 620;
            const hit = Math.max(0, 1 - Math.abs(distance - ring) / 86);
            particle.vx += dx / distance * hit * 2.6 * ripple.force;
            particle.vy += dy / distance * hit * 2.6 * ripple.force;
          });

          particle.vx *= 0.83;
          particle.vy *= 0.83;
          particle.x += particle.vx;
          particle.y += particle.vy;
        }

        function drawBackground(time) {
          const gradient = ctx.createRadialGradient(width * 0.5, height * 0.48, 40, width * 0.5, height * 0.5, Math.max(width, height) * 0.72);
          gradient.addColorStop(0, "#fffaf1");
          gradient.addColorStop(0.45, "#f4efe6");
          gradient.addColorStop(1, "#d9d0c2");
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, width, height);

          ctx.globalAlpha = 0.2;
          ctx.strokeStyle = colors[activeColor];
          ctx.lineWidth = 1;
          for (let i = 0; i < 9; i += 1) {
            const y = height * (0.2 + i * 0.07) + Math.sin(time * 0.0004 + i) * 16;
            ctx.beginPath();
            for (let x = -40; x <= width + 40; x += 40) {
              const wave = Math.sin(x * 0.012 + time * 0.0007 + i) * (16 + i * 2);
              if (x === -40) ctx.moveTo(x, y + wave);
              else ctx.lineTo(x, y + wave);
            }
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }

        function drawMemoryText() {
          const size = fontSizeForViewport();
          ctx.save();
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `${size}px Georgia, Times New Roman, serif`;
          ctx.globalAlpha = 0.045;
          ctx.fillStyle = "#11110f";
          ctx.fillText("dinguerie", width * 0.5, height * 0.48);
          ctx.globalAlpha = 0.12;
          ctx.lineWidth = 1;
          ctx.strokeStyle = colors[activeColor];
          ctx.strokeText("dinguerie", width * 0.5 + Math.sin(pressure) * 5, height * 0.48 + Math.cos(pressure) * 3);
          ctx.restore();
        }

        function draw(time = 0) {
          if (!paused && !reducedMotion) {
            particles.forEach((particle) => updateParticle(particle, time));
            ripples.forEach((ripple) => { ripple.life += 0.015; });
            ripples = ripples.filter((ripple) => ripple.life < 1.18);
            shards.forEach((shard) => {
              shard.x += shard.vx;
              shard.y += shard.vy;
              shard.vx *= 0.94;
              shard.vy *= 0.94;
              shard.angle += shard.spin;
              shard.life *= 0.965;
            });
            shards = shards.filter((shard) => shard.life > 0.04);
            pressure = Math.max(0.28, pressure * 0.992);
          }

          drawBackground(time);
          drawMemoryText();

          ctx.lineWidth = 1;
          for (let i = 0; i < particles.length; i += 9) {
            const particle = particles[i];
            const next = particles[(i + 53) % particles.length];
            const distance = Math.hypot(next.x - particle.x, next.y - particle.y);
            if (distance < 90 + pressure * 35) {
              ctx.globalAlpha = Math.max(0, 0.2 - distance / 520);
              ctx.strokeStyle = colors[particle.color];
              ctx.beginPath();
              ctx.moveTo(particle.x, particle.y);
              ctx.lineTo(next.x, next.y);
              ctx.stroke();
            }
          }

          particles.forEach((particle, index) => {
            ctx.globalAlpha = index % 19 === 0 ? 0.96 : 0.72;
            ctx.fillStyle = colors[particle.color];
            ctx.beginPath();
            if (index % 31 === 0) {
              ctx.rect(particle.x - particle.size, particle.y - particle.size, particle.size * 2.2, particle.size * 2.2);
            } else {
              ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
            }
            ctx.fill();
          });

          shards.forEach((shard) => {
            ctx.save();
            ctx.globalAlpha = shard.life * 0.5;
            ctx.translate(shard.x, shard.y);
            ctx.rotate(shard.angle);
            ctx.strokeStyle = shard.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(-shard.size / 2, -shard.size / 3, shard.size, shard.size * 0.66);
            ctx.restore();
          });

          ripples.forEach((ripple) => {
            ctx.globalAlpha = Math.max(0, 0.28 - ripple.life * 0.22);
            ctx.strokeStyle = colors[activeColor];
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ripple.x, ripple.y, ripple.life * 620, 0, Math.PI * 2);
            ctx.stroke();
          });

          if (printFlash > 0) {
            ctx.globalAlpha = printFlash;
            ctx.fillStyle = "#11110f";
            ctx.fillRect(0, 0, width, height);
            printFlash *= 0.86;
          }

          ctx.globalAlpha = 1;
          pressureLabel.textContent = pressure.toFixed(2);
          stateLabel.textContent = paused ? "still" : pointer.down ? "held" : ripples.length ? "open" : "awake";
          if (!paused) readout.textContent = pressure > 0.7 ? "reforming" : "forming";
          frame = requestAnimationFrame(draw);
        }

        sparkButton.addEventListener("click", () => ignite(width / 2, height * 0.47, 1.1));
        pauseButton.addEventListener("click", () => {
          paused = !paused;
          readout.textContent = paused ? "still" : "forming";
          pauseButton.setAttribute("aria-label", paused ? "Resume" : "Pause");
          pauseButton.title = paused ? "Resume" : "Pause";
        });
        clearButton.addEventListener("click", () => rebuild(false));
        printButton.addEventListener("click", () => {
          printFlash = 0.12;
          updateCopy();
        });
        seedInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") rebuild(true);
        });
        seedInput.addEventListener("change", () => rebuild(true));

        addEventListener("resize", resize, { passive: true });
        addEventListener("pointermove", (event) => {
          pointer.x = event.clientX;
          pointer.y = event.clientY;
          pointer.active = true;
        }, { passive: true });
        addEventListener("pointerdown", (event) => {
          pointer.down = true;
          ignite(event.clientX, event.clientY, 0.75);
        }, { passive: true });
        addEventListener("pointerup", () => {
          pointer.down = false;
        }, { passive: true });
        addEventListener("pointerleave", () => {
          pointer.active = false;
          pointer.down = false;
        }, { passive: true });
        document.addEventListener("visibilitychange", () => {
          cancelAnimationFrame(frame);
          if (!document.hidden) frame = requestAnimationFrame(draw);
        });

        resize();
        draw();
      })();
    </script>
  </body>
</html>
