<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="dinguerie is a 3D geodesic surface.">
    <meta name="theme-color" content="#f3eee4">
    <meta property="og:title" content="dinguerie">
    <meta property="og:description" content="A 3D geodesic surface.">
    <meta property="og:type" content="website">
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23100f0c'/%3E%3Cpath d='M7 45C19 12 41 55 57 20' fill='none' stroke='%23f3eee4' stroke-width='5' stroke-linecap='square'/%3E%3Cpath d='M11 40C28 20 39 48 53 28' fill='none' stroke='%23baff39' stroke-width='5' stroke-linecap='square'/%3E%3C/svg%3E"
    >
    <title>dinguerie</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f3eee4;
        --paper-hot: #fffaf0;
        --ink: #100f0c;
        --soft: #6e665c;
        --line: rgba(16, 15, 12, 0.18);
        --line-strong: rgba(16, 15, 12, 0.42);
        --blue: #2454ff;
        --red: #ff4f35;
        --green: #baff39;
        --mint: #38d0aa;
        --gold: #d4a321;
        --violet: #7e69ff;
        --mono: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", monospace;
        --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --serif: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      a,
      button {
        color: inherit;
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      ::selection {
        background: var(--ink);
        color: var(--paper);
      }

      :focus-visible {
        outline: 3px solid var(--green);
        outline-offset: 4px;
      }

      .surface-lab {
        position: fixed;
        inset: 0;
        isolation: isolate;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(16, 15, 12, 0.028) 1px, transparent 1px),
          linear-gradient(0deg, rgba(16, 15, 12, 0.028) 1px, transparent 1px),
          radial-gradient(circle at 50% 52%, var(--paper-hot), var(--paper) 58%, #d6cbbb 100%);
        background-size: 36px 36px, 36px 36px, 100% 100%;
      }

      #scene {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        cursor: grab;
        touch-action: none;
      }

      #scene.is-dragging {
        cursor: grabbing;
      }

      .chrome {
        position: fixed;
        inset: 0 0 auto;
        z-index: 3;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 1rem;
        align-items: center;
        padding: 1rem 1.25rem;
        pointer-events: none;
      }

      .brand,
      .formula,
      .readout {
        pointer-events: auto;
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 850;
      }

      .brand {
        justify-self: start;
        text-decoration: none;
      }

      .brand::before {
        display: inline-block;
        width: 0.72rem;
        height: 0.72rem;
        margin-right: 0.62rem;
        background: var(--green);
        box-shadow: inset 0 0 0 2px var(--ink);
        content: "";
        vertical-align: -0.08rem;
      }

      .formula {
        justify-self: center;
        min-width: 28rem;
        padding: 0.55rem 0.78rem;
        border: 1px solid var(--line);
        background: rgba(255, 250, 240, 0.86);
        text-align: center;
      }

      .readout {
        justify-self: end;
        color: var(--soft);
        text-align: right;
        text-transform: uppercase;
      }

      .panel {
        position: fixed;
        right: 1.25rem;
        bottom: 1.15rem;
        z-index: 3;
        display: grid;
        width: min(30rem, calc(100vw - 2.5rem));
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        border: 1px solid var(--line);
        background: var(--line);
        box-shadow: 9px 9px 0 rgba(16, 15, 12, 0.075);
      }

      .cell {
        min-height: 4.3rem;
        padding: 0.72rem;
        background: rgba(243, 238, 228, 0.92);
      }

      .cell span {
        display: block;
        color: var(--soft);
        font-family: var(--mono);
        font-size: 0.62rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .cell strong {
        display: block;
        margin-top: 0.58rem;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 0.95rem;
        font-weight: 900;
      }

      .caption {
        position: fixed;
        left: 1.25rem;
        bottom: 1.18rem;
        z-index: 3;
        width: min(31rem, calc(100vw - 2.5rem));
        color: rgba(16, 15, 12, 0.74);
        font-family: var(--mono);
        font-size: 0.66rem;
        font-weight: 850;
        line-height: 1.38;
        text-transform: uppercase;
        pointer-events: none;
      }

      .caption strong {
        display: block;
        color: var(--ink);
      }

      .actions {
        position: fixed;
        top: 4.75rem;
        right: 1.25rem;
        z-index: 3;
        display: flex;
        gap: 0.5rem;
      }

      .action {
        min-height: 2.45rem;
        padding: 0.55rem 0.75rem;
        border: 1px solid var(--line-strong);
        background: rgba(255, 250, 240, 0.9);
        font-family: var(--mono);
        font-size: 0.64rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .action:hover {
        background: var(--paper-hot);
      }

      @media (max-width: 920px) {
        .chrome {
          grid-template-columns: 1fr auto;
          padding: 0.85rem;
        }

        .formula {
          display: none;
        }

        .panel {
          right: 0.85rem;
          bottom: 0.85rem;
          width: min(22rem, calc(100vw - 1.7rem));
          grid-template-columns: 1fr;
        }

        .caption {
          left: 0.85rem;
          bottom: 14rem;
          width: min(24rem, calc(100vw - 1.7rem));
          font-size: 0.6rem;
        }

        .actions {
          top: auto;
          right: 0.85rem;
          bottom: 14.2rem;
        }
      }

      @media (max-width: 560px) {
        .readout,
        .panel {
          display: none;
        }

        .caption {
          bottom: 0.85rem;
        }

        .actions {
          left: 0.85rem;
          right: auto;
          display: grid;
          width: max-content;
          bottom: auto;
          top: 4.2rem;
          justify-items: start;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="surface-lab" id="top" aria-label="dinguerie geodesic surface">
      <canvas id="scene" aria-label="A 3D surface where two clicked points are joined by a surface shortest path"></canvas>

      <header class="chrome">
        <a class="brand" href="#top">dinguerie</a>
        <div class="formula">straight on the map can be longer on the surface</div>
        <div class="readout" id="status">select two points</div>
      </header>

      <div class="actions">
        <button class="action" id="reset" type="button">reset</button>
        <button class="action" id="newSurface" type="button">new surface</button>
      </div>

      <section class="panel" aria-label="Path measurements">
        <div class="cell">
          <span>surface path</span>
          <strong id="surfaceLength">0.00</strong>
        </div>
        <div class="cell">
          <span>2d-straight path</span>
          <strong id="straightLength">0.00</strong>
        </div>
        <div class="cell">
          <span>distance saved</span>
          <strong id="savedLength">0%</strong>
        </div>
      </section>

      <p class="caption">
        <strong>Click any two points.</strong>
        Orange is the line you would draw on a flat map, lifted onto the surface. Green finds the shorter walk.
      </p>
    </main>

    <script type="module">
      import * as THREE from "three";

      const canvas = document.querySelector("#scene");
      const statusLabel = document.querySelector("#status");
      const surfaceLengthLabel = document.querySelector("#surfaceLength");
      const straightLengthLabel = document.querySelector("#straightLength");
      const savedLengthLabel = document.querySelector("#savedLength");
      const resetButton = document.querySelector("#reset");
      const newSurfaceButton = document.querySelector("#newSurface");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 120);
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      const surfaceSize = 13.5;
      const grid = 88;
      const spacing = surfaceSize / (grid - 1);
      const nodeCount = grid * grid;
      const up = new THREE.Vector3(0, 1, 0);
      const selected = [];
      const markers = [];
      const surfaceVariants = [
        { seed: 4.9, from: [22, 42], to: [60, 26] },
        { seed: 8.11, from: [26, 26], to: [64, 42] },
        { seed: 11.32, from: [26, 26], to: [60, 50] },
        { seed: 14.53, from: [26, 34], to: [64, 50] },
        { seed: 17.74, from: [26, 50], to: [64, 34] },
        { seed: 20.95, from: [26, 30], to: [64, 46] }
      ];
      let surfaceVariant = 0;
      let terrainSeed = surfaceVariants[surfaceVariant].seed;
      let terrainParams = makeTerrainParams(terrainSeed);
      let heights = [];
      let vertices = [];
      let surfaceMesh;
      let wireMesh;
      let contourMesh;
      let pathObject;
      let straightObject;
      let pathPoints = [];
      let pathLength = 0;
      let straightLength = 0;
      let reveal = 1;
      let last = 0;
      let targetYaw = -0.52;
      let yaw = -0.52;
      let targetTilt = 0.78;
      let tilt = 0.78;
      let targetRadius = 15.6;
      let radius = 15.6;
      const drag = {
        active: false,
        moved: false,
        pointerId: null,
        startX: 0,
        startY: 0,
        startYaw: 0,
        startTilt: 0
      };

      scene.fog = new THREE.Fog(0xf3eee4, 16, 35);
      camera.position.set(0, 6.2, 13.2);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.setClearColor(0xf3eee4, 0);

      const ambient = new THREE.HemisphereLight(0xfffaf0, 0x6c665b, 2.5);
      scene.add(ambient);
      const key = new THREE.DirectionalLight(0xffffff, 3.2);
      key.position.set(-5, 7, 6);
      scene.add(key);
      const rim = new THREE.DirectionalLight(0xbaff39, 1.15);
      rim.position.set(5, 3, -5);
      scene.add(rim);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(60, 60, 1, 1),
        new THREE.MeshBasicMaterial({ color: 0xf3eee4, transparent: true, opacity: 0.18 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -2.4;
      scene.add(floor);

      function makeTerrainParams(seed) {
        const angle = seed * 1.173;
        const normal = {
          x: Math.cos(angle) * 0.92,
          z: Math.sin(angle) * 0.92
        };
        const tangent = { x: -normal.z, z: normal.x };
        return {
          seed,
          normal,
          tangent,
          wallHeight: 4.4 + 1.4 * (0.5 + 0.5 * Math.sin(seed * 1.7)),
          wallWidth: 1 + 0.8 * (0.5 + 0.5 * Math.cos(seed * 1.23)),
          gateOffset: -3.2 + 6.4 * (0.5 + 0.5 * Math.sin(seed * 0.91)),
          gateWidth: 0.55 + 0.55 * (0.5 + 0.5 * Math.cos(seed * 1.43)),
          bowlA: {
            x: -3.8 + 1.4 * Math.sin(seed * 0.61),
            z: -1.2 + 2.8 * Math.cos(seed * 0.47),
            amp: -0.8 - 0.45 * (0.5 + 0.5 * Math.sin(seed * 1.9))
          },
          bowlB: {
            x: 3.6 + 1.3 * Math.cos(seed * 0.74),
            z: 1.4 + 2.5 * Math.sin(seed * 0.52),
            amp: -0.7 - 0.35 * (0.5 + 0.5 * Math.cos(seed * 2.1))
          },
          spike: {
            x: 1.2 + 3.2 * Math.sin(seed * 0.83),
            z: -2 + 3.1 * Math.cos(seed * 0.67),
            amp: 0.75 + 0.95 * (0.5 + 0.5 * Math.sin(seed * 1.31))
          }
        };
      }

      function terrain(x, z) {
        const p = terrainParams;
        const along = x * p.tangent.x + z * p.tangent.z;
        const across = x * p.normal.x + z * p.normal.z;
        const gate = 0.16 + 0.84 * (1 - Math.exp(-((along - p.gateOffset) ** 2) * p.gateWidth));
        const wall = p.wallHeight * Math.exp(-(across ** 2) * p.wallWidth) * gate;
        const bowlA = p.bowlA.amp * Math.exp(-((x - p.bowlA.x) ** 2 + (z - p.bowlA.z) ** 2) * 0.18);
        const bowlB = p.bowlB.amp * Math.exp(-((x - p.bowlB.x) ** 2 + (z - p.bowlB.z) ** 2) * 0.2);
        const saddle = 0.74
          * Math.sin(x * (0.48 + 0.1 * Math.sin(p.seed)) + p.seed)
          * Math.cos(z * (0.42 + 0.12 * Math.cos(p.seed * 0.8)) - p.seed * 0.3);
        const rib = 0.42 * Math.sin((x * p.tangent.x + z * p.tangent.z) * 1.32 + p.seed * 1.4);
        const spike = p.spike.amp * Math.exp(-((x - p.spike.x) ** 2 + (z - p.spike.z) ** 2) * 0.38);
        return wall + bowlA + bowlB + saddle + rib + spike - 0.75;
      }

      function index(i, j) {
        return j * grid + i;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function nodePosition(i, j) {
        return vertices[index(i, j)];
      }

      function pointForIndex(id) {
        return vertices[id].clone();
      }

      function makeSurface() {
        heights = new Array(nodeCount);
        vertices = new Array(nodeCount);
        const positions = new Float32Array(nodeCount * 3);
        const colors = new Float32Array(nodeCount * 3);
        const color = new THREE.Color();

        for (let j = 0; j < grid; j += 1) {
          for (let i = 0; i < grid; i += 1) {
            const x = -surfaceSize / 2 + i * spacing;
            const z = -surfaceSize / 2 + j * spacing;
            const y = terrain(x, z);
            const id = index(i, j);
            heights[id] = y;
            vertices[id] = new THREE.Vector3(x, y, z);
            positions[id * 3] = x;
            positions[id * 3 + 1] = y;
            positions[id * 3 + 2] = z;
            const t = clamp((y + 1.85) / 7.2, 0, 1);
            const hue = 0.55 - t * 0.28;
            color.setHSL(hue, 0.56, 0.6 + t * 0.18);
            colors[id * 3] = color.r;
            colors[id * 3 + 1] = color.g;
            colors[id * 3 + 2] = color.b;
          }
        }

        const indices = [];
        for (let j = 0; j < grid - 1; j += 1) {
          for (let i = 0; i < grid - 1; i += 1) {
            const a = index(i, j);
            const b = index(i + 1, j);
            const c = index(i + 1, j + 1);
            const d = index(i, j + 1);
            indices.push(a, b, d, b, c, d);
          }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();
        const material = new THREE.MeshStandardMaterial({
          vertexColors: true,
          roughness: 0.92,
          metalness: 0,
          side: THREE.DoubleSide
        });

        if (surfaceMesh) {
          scene.remove(surfaceMesh);
          surfaceMesh.geometry.dispose();
          surfaceMesh.material.dispose();
        }
        surfaceMesh = new THREE.Mesh(geometry, material);
        surfaceMesh.userData.surface = true;
        scene.add(surfaceMesh);

        if (wireMesh) {
          scene.remove(wireMesh);
          wireMesh.geometry.dispose();
          wireMesh.material.dispose();
        }
        wireMesh = new THREE.LineSegments(
          new THREE.WireframeGeometry(geometry),
          new THREE.LineBasicMaterial({ color: 0x100f0c, transparent: true, opacity: 0.07 })
        );
        scene.add(wireMesh);
        makeContourLines();
      }

      function contourPoint(a, b, level) {
        const ha = heights[a];
        const hb = heights[b];
        const delta = hb - ha;
        if (Math.abs(delta) < 0.0001) return null;
        const t = clamp((level - ha) / delta, 0, 1);
        return vertices[a].clone().lerp(vertices[b], t).addScaledVector(up, 0.035);
      }

      function makeContourLines() {
        if (contourMesh) disposeObject(contourMesh);
        const positions = [];
        const levels = [];
        for (let level = -1.25; level <= 5.9; level += 0.42) levels.push(level);

        for (let j = 0; j < grid - 1; j += 1) {
          for (let i = 0; i < grid - 1; i += 1) {
            const a = index(i, j);
            const b = index(i + 1, j);
            const c = index(i + 1, j + 1);
            const d = index(i, j + 1);

            levels.forEach((level) => {
              const hits = [];
              [[a, b], [b, c], [c, d], [d, a]].forEach(([from, to]) => {
                const low = Math.min(heights[from], heights[to]);
                const high = Math.max(heights[from], heights[to]);
                if (level <= low || level > high) return;
                const point = contourPoint(from, to, level);
                if (point) hits.push(point);
              });

              for (let h = 1; h < hits.length; h += 2) {
                positions.push(hits[h - 1].x, hits[h - 1].y, hits[h - 1].z);
                positions.push(hits[h].x, hits[h].y, hits[h].z);
              }
            });
          }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
        const material = new THREE.LineBasicMaterial({
          color: 0x100f0c,
          transparent: true,
          opacity: 0.135,
          depthWrite: false
        });
        contourMesh = new THREE.LineSegments(geometry, material);
        contourMesh.renderOrder = 1;
        scene.add(contourMesh);
      }

      function nearestGridId(point) {
        const i = clamp(Math.round((point.x + surfaceSize / 2) / spacing), 0, grid - 1);
        const j = clamp(Math.round((point.z + surfaceSize / 2) / spacing), 0, grid - 1);
        return index(i, j);
      }

      function edgeWeight(a, b) {
        const pa = vertices[a];
        const pb = vertices[b];
        return pa.distanceTo(pb);
      }

      function heuristic(a, b) {
        return vertices[a].distanceTo(vertices[b]);
      }

      function shortestPath(start, goal) {
        const open = [start];
        const inOpen = new Uint8Array(nodeCount);
        const closed = new Uint8Array(nodeCount);
        const cameFrom = new Int32Array(nodeCount);
        const g = new Float64Array(nodeCount);
        const f = new Float64Array(nodeCount);
        cameFrom.fill(-1);
        g.fill(Infinity);
        f.fill(Infinity);
        g[start] = 0;
        f[start] = heuristic(start, goal);
        inOpen[start] = 1;

        while (open.length) {
          let bestIndex = 0;
          let bestScore = f[open[0]];
          for (let i = 1; i < open.length; i += 1) {
            const score = f[open[i]];
            if (score < bestScore) {
              bestScore = score;
              bestIndex = i;
            }
          }

          const current = open.splice(bestIndex, 1)[0];
          inOpen[current] = 0;
          if (current === goal) break;
          closed[current] = 1;
          const cx = current % grid;
          const cy = Math.floor(current / grid);

          for (let oy = -1; oy <= 1; oy += 1) {
            for (let ox = -1; ox <= 1; ox += 1) {
              if (!ox && !oy) continue;
              const nx = cx + ox;
              const ny = cy + oy;
              if (nx < 0 || nx >= grid || ny < 0 || ny >= grid) continue;
              const next = index(nx, ny);
              if (closed[next]) continue;
              const tentative = g[current] + edgeWeight(current, next);
              if (tentative >= g[next]) continue;
              cameFrom[next] = current;
              g[next] = tentative;
              f[next] = tentative + heuristic(next, goal);
              if (!inOpen[next]) {
                open.push(next);
                inOpen[next] = 1;
              }
            }
          }
        }

        const path = [];
        let current = goal;
        while (current !== -1) {
          path.push(current);
          if (current === start) break;
          current = cameFrom[current];
        }
        return path.reverse();
      }

      function pathDistance(points) {
        let total = 0;
        for (let i = 1; i < points.length; i += 1) total += points[i - 1].distanceTo(points[i]);
        return total;
      }

      function projectedStraightPath(start, goal) {
        const from = vertices[start];
        const to = vertices[goal];
        const points = [];
        const samples = 150;
        for (let step = 0; step <= samples; step += 1) {
          const t = step / samples;
          const x = from.x + (to.x - from.x) * t;
          const z = from.z + (to.z - from.z) * t;
          points.push(new THREE.Vector3(x, terrain(x, z), z).addScaledVector(up, 0.18));
        }
        return points;
      }

      function disposeObject(object) {
        if (!object) return;
        scene.remove(object);
        object.traverse((child) => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach((material) => material.dispose());
            else child.material.dispose();
          }
        });
      }

      function tube(points, color, radius, opacity = 1, depthTest = true, renderOrder = 2) {
        const curve = points.length === 2
          ? new THREE.LineCurve3(points[0], points[1])
          : new THREE.CatmullRomCurve3(points, false, "centripetal", 0.35);
        const geometry = new THREE.TubeGeometry(curve, Math.max(20, points.length * 2), radius, 8, false);
        const material = new THREE.MeshStandardMaterial({
          color,
          emissive: color,
          emissiveIntensity: 0.18,
          roughness: 0.45,
          transparent: opacity < 1,
          opacity,
          depthTest,
          depthWrite: depthTest
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.renderOrder = renderOrder;
        return mesh;
      }

      function marker(point, color, label) {
        const group = new THREE.Group();
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.16, 24, 16),
          new THREE.MeshStandardMaterial({
            color,
            emissive: color,
            emissiveIntensity: 0.2,
            roughness: 0.35,
            depthTest: false,
            depthWrite: false
          })
        );
        sphere.position.copy(point).addScaledVector(up, 0.22);
        group.add(sphere);

        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(0.28, 0.018, 8, 48),
          new THREE.MeshBasicMaterial({ color: 0x100f0c, depthTest: false, depthWrite: false })
        );
        ring.rotation.x = Math.PI / 2;
        ring.position.copy(point).addScaledVector(up, 0.08);
        group.add(ring);
        group.userData.label = label;
        group.renderOrder = 5;
        return group;
      }

      function updateMarkers() {
        markers.forEach((item) => disposeObject(item));
        markers.length = 0;
        selected.forEach((id, index) => {
          const item = marker(pointForIndex(id), index ? 0xff4f35 : 0xbaff39, index ? "B" : "A");
          markers.push(item);
          scene.add(item);
        });
      }

      function computeAndDraw() {
        disposeObject(pathObject);
        disposeObject(straightObject);
        pathObject = undefined;
        straightObject = undefined;
        pathPoints = [];

        updateMarkers();
        if (selected.length < 2) {
          statusLabel.textContent = selected.length ? "select end point" : "select two points";
          surfaceLengthLabel.textContent = "0.00";
          straightLengthLabel.textContent = "0.00";
          savedLengthLabel.textContent = "0%";
          return;
        }

        const nodePath = shortestPath(selected[0], selected[1]);
        pathPoints = nodePath.map((id) => pointForIndex(id).addScaledVector(up, 0.22));
        const straightPoints = projectedStraightPath(selected[0], selected[1]);
        pathLength = pathDistance(pathPoints);
        straightLength = pathDistance(straightPoints);
        const saved = (straightLength / Math.max(pathLength, 0.001) - 1) * 100;

        straightObject = tube(straightPoints, 0xff4f35, 0.045, 0.7, false, 3);
        pathObject = tube(pathPoints, 0xbaff39, 0.068, 1, false, 4);
        scene.add(straightObject, pathObject);
        reveal = 0;
        statusLabel.textContent = `computed ${nodePath.length} mesh nodes`;
        surfaceLengthLabel.textContent = pathLength.toFixed(2);
        straightLengthLabel.textContent = straightLength.toFixed(2);
        savedLengthLabel.textContent = `${saved.toFixed(0)}%`;
      }

      function placeDefaultPath() {
        const variant = surfaceVariants[surfaceVariant];
        selected.length = 0;
        selected.push(index(variant.from[0], variant.from[1]), index(variant.to[0], variant.to[1]));
        computeAndDraw();
      }

      function selectSurfaceAt(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hit = raycaster.intersectObject(surfaceMesh, false)[0];
        if (!hit) return;
        if (selected.length === 2) selected.length = 0;
        selected.push(nearestGridId(hit.point));
        computeAndDraw();
      }

      function beginDrag(event) {
        if (event.button !== undefined && event.button !== 0) return;
        drag.active = true;
        drag.moved = false;
        drag.pointerId = event.pointerId;
        drag.startX = event.clientX;
        drag.startY = event.clientY;
        drag.startYaw = targetYaw;
        drag.startTilt = targetTilt;
        canvas.classList.add("is-dragging");
        canvas.setPointerCapture(event.pointerId);
        event.preventDefault();
      }

      function moveDrag(event) {
        if (!drag.active || event.pointerId !== drag.pointerId) return;
        const dx = event.clientX - drag.startX;
        const dy = event.clientY - drag.startY;
        if (Math.hypot(dx, dy) > 4) drag.moved = true;
        targetYaw = drag.startYaw - dx * 0.006;
        targetTilt = clamp(drag.startTilt + dy * 0.004, 0.25, 1.12);
        event.preventDefault();
      }

      function endDrag(event) {
        if (!drag.active || event.pointerId !== drag.pointerId) return;
        const wasClick = !drag.moved;
        drag.active = false;
        canvas.classList.remove("is-dragging");
        if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);
        if (wasClick) selectSurfaceAt(event.clientX, event.clientY);
        event.preventDefault();
      }

      function cancelDrag(event) {
        if (!drag.active || event.pointerId !== drag.pointerId) return;
        drag.active = false;
        canvas.classList.remove("is-dragging");
        if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);
      }

      function zoomCamera(event) {
        targetRadius = clamp(targetRadius + event.deltaY * 0.012, 11.5, 22);
        event.preventDefault();
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        renderer.setPixelRatio(dpr);
        renderer.setSize(rect.width, rect.height, false);
        camera.aspect = rect.width / Math.max(rect.height, 1);
        camera.updateProjectionMatrix();
      }

      function updateCamera() {
        camera.position.set(
          Math.sin(yaw) * radius,
          6 + Math.sin(tilt) * 3.8,
          Math.cos(yaw) * radius
        );
        camera.lookAt(0, 1, 0);
      }

      function animate(now = 0) {
        const dt = Math.min(0.05, (now - last) / 1000 || 0.016);
        last = now;
        yaw += (targetYaw - yaw) * 0.05;
        tilt += (targetTilt - tilt) * 0.05;
        radius += (targetRadius - radius) * 0.06;
        updateCamera();

        if (pathObject) {
          reveal = Math.min(1, reveal + dt * 0.9);
          pathObject.material.emissiveIntensity = 0.18 + Math.sin(now * 0.004) * 0.045;
        }
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      function reset() {
        selected.length = 0;
        placeDefaultPath();
      }

      function newSurface() {
        surfaceVariant = (surfaceVariant + 1) % surfaceVariants.length;
        terrainSeed = surfaceVariants[surfaceVariant].seed;
        terrainParams = makeTerrainParams(terrainSeed);
        disposeObject(pathObject);
        disposeObject(straightObject);
        pathObject = undefined;
        straightObject = undefined;
        markers.forEach((item) => disposeObject(item));
        selected.length = 0;
        makeSurface();
        placeDefaultPath();
      }

      canvas.addEventListener("pointerdown", beginDrag);
      canvas.addEventListener("pointermove", moveDrag);
      canvas.addEventListener("pointerup", endDrag);
      canvas.addEventListener("pointercancel", cancelDrag);
      canvas.addEventListener("wheel", zoomCamera, { passive: false });
      window.addEventListener("resize", resize);
      resetButton.addEventListener("click", reset);
      newSurfaceButton.addEventListener("click", newSurface);

      makeSurface();
      placeDefaultPath();
      resize();
      updateCamera();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
