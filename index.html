<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="dinguerie is an impossible non-Euclidean observatory.">
    <meta name="theme-color" content="#f3eee4">
    <meta property="og:title" content="dinguerie">
    <meta property="og:description" content="An impossible non-Euclidean observatory.">
    <meta property="og:type" content="website">
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23100f0c'/%3E%3Cpath d='M13 49V25Q13 13 25 13t12 12v24M32 49V25q0-12 10-12t10 12v24' fill='none' stroke='%23f3eee4' stroke-width='4'/%3E%3Cpath d='M12 38C24 23 39 52 52 31' fill='none' stroke='%23baff39' stroke-width='5'/%3E%3C/svg%3E"
    >
    <title>dinguerie</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f3eee4;
        --paper-hot: #fffaf0;
        --ink: #100f0c;
        --soft: #6d655a;
        --line: rgba(16, 15, 12, 0.18);
        --line-strong: rgba(16, 15, 12, 0.42);
        --blue: #2454ff;
        --red: #ff4f35;
        --green: #baff39;
        --mint: #38d0aa;
        --gold: #d4a321;
        --violet: #7e69ff;
        --mono: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", monospace;
        --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --serif: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      a {
        color: inherit;
        font: inherit;
      }

      ::selection {
        background: var(--ink);
        color: var(--paper);
      }

      :focus-visible {
        outline: 3px solid var(--green);
        outline-offset: 4px;
      }

      .observatory {
        position: fixed;
        inset: 0;
        isolation: isolate;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(16, 15, 12, 0.038) 1px, transparent 1px),
          linear-gradient(0deg, rgba(16, 15, 12, 0.038) 1px, transparent 1px),
          radial-gradient(circle at 50% 58%, var(--paper-hot), var(--paper) 58%, #d7ccbd 100%);
        background-size: 34px 34px, 34px 34px, 100% 100%;
      }

      .stage {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        cursor: crosshair;
        touch-action: none;
      }

      .stage path,
      .stage rect,
      .stage circle,
      .stage line,
      .stage text {
        vector-effect: non-scaling-stroke;
      }

      .wall {
        fill: rgba(255, 250, 240, 0.38);
        stroke: rgba(16, 15, 12, 0.2);
        stroke-width: 1;
      }

      .floor-line,
      .wall-line {
        stroke: rgba(16, 15, 12, 0.14);
        stroke-width: 1;
      }

      .wall-line-strong {
        stroke: rgba(16, 15, 12, 0.28);
        stroke-width: 1.35;
      }

      .portal-fill {
        fill: rgba(255, 250, 240, 0.8);
      }

      .portal-skin {
        stroke: rgba(16, 15, 12, 0.22);
        stroke-width: 0.9;
      }

      .portal-depth {
        fill: none;
        stroke: rgba(16, 15, 12, 0.18);
        stroke-width: 1;
      }

      .portal-frame {
        fill: none;
        stroke-linejoin: round;
        stroke-width: 4;
      }

      .portal-active {
        stroke-width: 7;
      }

      .beam-shadow {
        fill: none;
        stroke: var(--ink);
        stroke-linecap: square;
        stroke-linejoin: round;
        stroke-width: 9;
        stroke-opacity: 0.16;
      }

      .beam {
        fill: none;
        stroke-linecap: square;
        stroke-linejoin: round;
        stroke-width: 4;
        stroke-dasharray: 10 10;
        animation: pulse 1.2s linear infinite;
      }

      .beam-thin {
        stroke-width: 2;
        stroke-opacity: 0.55;
      }

      .gate-dot {
        fill: var(--paper-hot);
        stroke: var(--ink);
        stroke-width: 2;
      }

      .you {
        fill: var(--green);
        stroke: var(--ink);
        stroke-width: 2.2;
      }

      .you-ring {
        fill: none;
        stroke: var(--ink);
        stroke-dasharray: 3 7;
        stroke-width: 1.2;
      }

      .label {
        fill: var(--ink);
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 900;
        paint-order: stroke;
        stroke: var(--paper);
        stroke-width: 5px;
        text-transform: uppercase;
      }

      .ghost-label {
        fill: rgba(16, 15, 12, 0.28);
        font-family: var(--serif);
        font-size: 116px;
        font-weight: 500;
      }

      .micro-label {
        fill: rgba(16, 15, 12, 0.62);
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .chrome {
        position: fixed;
        inset: 0 0 auto;
        z-index: 4;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 1rem;
        align-items: center;
        padding: 1rem 1.25rem;
        pointer-events: none;
      }

      .brand,
      .formula,
      .readout {
        pointer-events: auto;
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 850;
      }

      .brand {
        justify-self: start;
        text-decoration: none;
      }

      .brand::before {
        display: inline-block;
        width: 0.72rem;
        height: 0.72rem;
        margin-right: 0.62rem;
        background: var(--green);
        box-shadow: inset 0 0 0 2px var(--ink);
        content: "";
        vertical-align: -0.08rem;
      }

      .formula {
        justify-self: center;
        min-width: 27rem;
        padding: 0.55rem 0.78rem;
        border: 1px solid var(--line);
        background: rgba(243, 238, 228, 0.9);
        text-align: center;
      }

      .readout {
        justify-self: end;
        color: var(--soft);
        text-align: right;
        text-transform: uppercase;
      }

      .caption {
        position: fixed;
        right: 1.25rem;
        bottom: 1.05rem;
        z-index: 4;
        width: min(36rem, calc(100vw - 2.5rem));
        color: rgba(16, 15, 12, 0.72);
        font-family: var(--mono);
        font-size: 0.66rem;
        font-weight: 850;
        line-height: 1.35;
        text-align: right;
        text-transform: uppercase;
        pointer-events: none;
      }

      .caption strong {
        display: block;
        color: var(--ink);
      }

      @keyframes pulse {
        to {
          stroke-dashoffset: -20;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .beam {
          animation: none;
        }
      }

      @media (max-width: 820px) {
        .chrome {
          grid-template-columns: 1fr auto;
          padding: 0.85rem;
        }

        .formula {
          display: none;
        }

        .readout {
          font-size: 0.66rem;
        }

        .caption {
          right: 0.85rem;
          bottom: 0.85rem;
          width: min(24rem, calc(100vw - 1.7rem));
          font-size: 0.6rem;
        }
      }

      @media (max-width: 560px) {
        .readout {
          display: none;
        }

        .caption {
          right: auto;
          left: 0.85rem;
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="observatory" id="top" aria-label="dinguerie impossible observatory">
      <svg class="stage" id="stage" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Non-Euclidean observatory with paired portals">
        <defs id="defs"></defs>
        <g id="architecture"></g>
        <text class="ghost-label" x="600" y="520" text-anchor="middle">dinguerie</text>
        <g id="portals"></g>
        <g id="beams"></g>
        <g id="markers"></g>
      </svg>

      <header class="chrome">
        <a class="brand" href="#top">dinguerie</a>
        <div class="formula">paired doorways make one continuous room impossible to flatten</div>
        <div class="readout" id="readout">gate A to A'</div>
      </header>

      <p class="caption">
        <strong>Move to aim the route.</strong>
        A straight walk enters one doorway and exits its twin somewhere else. That tear in the floor plan is the non-Euclidean move.
      </p>
    </main>

    <script>
      (() => {
        const NS = "http://www.w3.org/2000/svg";
        const stage = document.querySelector("#stage");
        const defs = document.querySelector("#defs");
        const architecture = document.querySelector("#architecture");
        const portalsGroup = document.querySelector("#portals");
        const beamsGroup = document.querySelector("#beams");
        const markersGroup = document.querySelector("#markers");
        const readout = document.querySelector("#readout");
        const observer = { x: 600, y: 720 };
        const portals = [
          { id: "a", label: "A", pair: 1, x: 95, y: 240, w: 205, h: 430, color: "#2454ff" },
          { id: "ap", label: "A'", pair: 0, x: 880, y: 190, w: 235, h: 470, color: "#2454ff" },
          { id: "b", label: "B", pair: 3, x: 445, y: 86, w: 310, h: 330, color: "#ff4f35" },
          { id: "bp", label: "B'", pair: 2, x: 475, y: 535, w: 250, h: 310, color: "#ff4f35" },
          { id: "c", label: "C", pair: 5, x: 330, y: 460, w: 165, h: 255, color: "#d4a321" },
          { id: "cp", label: "C'", pair: 4, x: 742, y: 438, w: 165, h: 255, color: "#d4a321" }
        ];
        let target = { x: 930, y: 270 };
        let activeIndex = 1;
        let scheduled = false;

        function createSvg(name, attrs = {}) {
          const element = document.createElementNS(NS, name);
          Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
          return element;
        }

        function archPath(portal, inset = 0) {
          const x = portal.x + inset;
          const y = portal.y + inset;
          const w = portal.w - inset * 2;
          const h = portal.h - inset * 2;
          const crown = y + w * 0.5;
          return [
            `M${x.toFixed(2)} ${portal.y + portal.h - inset}`,
            `L${x.toFixed(2)} ${crown.toFixed(2)}`,
            `Q${x.toFixed(2)} ${y.toFixed(2)} ${(x + w / 2).toFixed(2)} ${y.toFixed(2)}`,
            `Q${(x + w).toFixed(2)} ${y.toFixed(2)} ${(x + w).toFixed(2)} ${crown.toFixed(2)}`,
            `L${(x + w).toFixed(2)} ${(portal.y + portal.h - inset).toFixed(2)}Z`
          ].join(" ");
        }

        function center(portal) {
          return { x: portal.x + portal.w / 2, y: portal.y + portal.h * 0.56 };
        }

        function distance(a, b) {
          return Math.hypot(a.x - b.x, a.y - b.y);
        }

        function normalize(vector) {
          const length = Math.hypot(vector.x, vector.y) || 1;
          return { x: vector.x / length, y: vector.y / length };
        }

        function curvePath(a, b, bend = 0) {
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const length = Math.hypot(dx, dy) || 1;
          const nx = -dy / length;
          const ny = dx / length;
          const c1 = { x: a.x + dx * 0.34 + nx * bend, y: a.y + dy * 0.34 + ny * bend };
          const c2 = { x: a.x + dx * 0.72 + nx * bend, y: a.y + dy * 0.72 + ny * bend };
          return `M${a.x.toFixed(2)} ${a.y.toFixed(2)}C${c1.x.toFixed(2)} ${c1.y.toFixed(2)} ${c2.x.toFixed(2)} ${c2.y.toFixed(2)} ${b.x.toFixed(2)} ${b.y.toFixed(2)}`;
        }

        function drawArchitecture() {
          const fragment = document.createDocumentFragment();
          fragment.append(createSvg("path", {
            class: "wall",
            d: "M0 0H1200V900H0Z"
          }));

          for (let i = 0; i <= 14; i += 1) {
            const y = 150 + i * 48;
            fragment.append(createSvg("line", { class: i % 4 ? "floor-line" : "wall-line-strong", x1: 0, y1: y, x2: 1200, y2: y }));
          }

          [90, 190, 300, 430, 600, 770, 900, 1010, 1110].forEach((x, index) => {
            fragment.append(createSvg("path", {
              class: index % 2 ? "floor-line" : "wall-line-strong",
              d: `M${x} 900L${600 + (x - 600) * 0.28} 120`
            }));
          });

          for (let i = 0; i < 9; i += 1) {
            const y = 610 + i * 34;
            fragment.append(createSvg("path", {
              class: "floor-line",
              d: `M${120 + i * 38} ${y}H${1080 - i * 38}`
            }));
          }

          architecture.replaceChildren(fragment);
        }

        function portalInterior(group, portal, active) {
          const id = `clip-${portal.id}`;
          defs.append(createSvg("clipPath", { id }));
          defs.lastChild.append(createSvg("path", { d: archPath(portal, 8) }));

          const inside = createSvg("g", { "clip-path": `url(#${id})` });
          inside.append(createSvg("path", { class: "portal-fill", d: archPath(portal, 8) }));
          for (let i = 0; i < 7; i += 1) {
            const inset = 18 + i * 17;
            if (portal.w - inset * 2 <= 14 || portal.h - inset * 2 <= 26) continue;
            inside.append(createSvg("path", {
              class: "portal-depth",
              d: archPath(portal, inset),
              stroke: portal.color,
              "stroke-opacity": active ? "0.42" : "0.2"
            }));
          }

          for (let i = 0; i < 9; i += 1) {
            const x = portal.x + 14 + i * portal.w / 8;
            inside.append(createSvg("line", {
              class: "portal-skin",
              x1: x,
              y1: portal.y + 8,
              x2: portal.x + portal.w / 2,
              y2: portal.y + portal.h - 8
            }));
          }

          group.append(inside);
        }

        function drawPortals() {
          defs.replaceChildren();
          const fragment = document.createDocumentFragment();
          portals.forEach((portal, index) => {
            const active = index === activeIndex || index === portals[activeIndex].pair;
            const group = createSvg("g", {});
            portalInterior(group, portal, active);
            group.append(createSvg("path", {
              class: active ? "portal-frame portal-active" : "portal-frame",
              d: archPath(portal),
              stroke: portal.color
            }));
            group.append(createSvg("path", {
              class: "portal-depth",
              d: archPath(portal, 11),
              stroke: "#100f0c",
              "stroke-opacity": active ? "0.48" : "0.24"
            }));
            const c = center(portal);
            group.append(createSvg("text", {
              class: "label",
              x: c.x - 12,
              y: portal.y + portal.h + 24
            }));
            group.lastChild.textContent = portal.label;
            fragment.append(group);
          });
          portalsGroup.replaceChildren(fragment);
        }

        function drawBeams() {
          const active = portals[activeIndex];
          const paired = portals[active.pair];
          const entry = center(active);
          const exit = center(paired);
          const aim = normalize({ x: target.x - entry.x, y: target.y - entry.y });
          const exitEnd = {
            x: exit.x + aim.x * 310,
            y: exit.y + aim.y * 310
          };
          const bounce = portals[(active.pair + 2) % portals.length];
          const bounceTarget = center(bounce);
          const routeOne = curvePath(observer, entry, -52);
          const routeTwo = curvePath(exit, exitEnd, 42);
          const routeThree = curvePath(exitEnd, bounceTarget, -36);
          const color = active.color;

          beamsGroup.replaceChildren(
            createSvg("path", { class: "beam-shadow", d: routeOne }),
            createSvg("path", { class: "beam-shadow", d: routeTwo }),
            createSvg("path", { class: "beam-shadow", d: routeThree }),
            createSvg("path", { class: "beam", d: routeOne, stroke: color }),
            createSvg("path", { class: "beam", d: routeTwo, stroke: color }),
            createSvg("path", { class: "beam beam-thin", d: routeThree, stroke: "#100f0c" })
          );

          markersGroup.replaceChildren(
            createSvg("circle", { class: "you-ring", cx: observer.x, cy: observer.y, r: 29 }),
            createSvg("circle", { class: "you", cx: observer.x, cy: observer.y, r: 9 }),
            createSvg("text", { class: "label", x: observer.x + 18, y: observer.y - 16 }),
            createSvg("circle", { class: "gate-dot", cx: entry.x, cy: entry.y, r: 8 }),
            createSvg("circle", { class: "gate-dot", cx: exit.x, cy: exit.y, r: 8 }),
            createSvg("text", { class: "micro-label", x: (entry.x + exit.x) / 2, y: Math.min(entry.y, exit.y) - 22, "text-anchor": "middle" })
          );
          markersGroup.children[2].textContent = "you";
          markersGroup.lastChild.textContent = `${active.label} and ${paired.label} are the same doorway`;
          readout.textContent = `gate ${active.label} to ${paired.label}`;
        }

        function nearestPortal(point) {
          let nearest = 0;
          let best = Infinity;
          portals.forEach((portal, index) => {
            const d = distance(point, center(portal));
            if (d < best) {
              best = d;
              nearest = index;
            }
          });
          return nearest;
        }

        function render() {
          activeIndex = nearestPortal(target);
          drawPortals();
          drawBeams();
          scheduled = false;
        }

        function scheduleRender() {
          if (scheduled) return;
          scheduled = true;
          requestAnimationFrame(render);
        }

        function pointerToSvg(event) {
          const matrix = stage.getScreenCTM();
          if (!matrix) return target;
          const point = stage.createSVGPoint();
          point.x = event.clientX;
          point.y = event.clientY;
          return point.matrixTransform(matrix.inverse());
        }

        stage.addEventListener("pointermove", (event) => {
          target = pointerToSvg(event);
          scheduleRender();
        }, { passive: true });

        stage.addEventListener("pointerdown", (event) => {
          target = pointerToSvg(event);
          scheduleRender();
        }, { passive: true });

        window.addEventListener("resize", scheduleRender);
        drawArchitecture();
        render();
      })();
    </script>
  </body>
</html>
